
 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pegawai</title>
    <style>
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Segoe UI,sans-serif; }
        body{ background:#f4f6f9; }
        .header{ background:#2e7d32; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }
        .logout{ background:#c62828; color:white; text-decoration:none; padding:8px 15px; border-radius:5px; }
        .container{ max-width:1200px; margin:auto; padding:20px; }
        .welcome{ background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.1); text-align: center; }
        .welcome img { width: 120px; height: auto; margin-bottom: 10px; }
        .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:20px; }
        .card{ background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); text-align: center; }
        .card h4{ color:#666; margin-bottom:10px; font-size: 14px; }
        .card p{ font-size:24px; font-weight:bold; color:#2e7d32; }
        .menu{ background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
        .menu-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; }
        .menu a{ text-decoration:none; text-align:center; padding:20px; background:#f5f5f5; border-radius:10px; color:#333; font-weight:bold; }
        .menu a:hover{ background:#2e7d32; color:white; }
    </style>
</head>
<body>

<div class="header">
    <h2>Dashboard Pegawai</h2>
    <a href="index.html" class="logout">Keluar</a>
</div>

<div class="container">
    <div class="welcome">
        <img src="logo.jpg" alt="Logo">
        <h2>Biro Jasa STNK Askara Zayyan</h2>
        <p>Selamat Bekerja</p>
    </div>

    <div class="grid">
        <div class="card"><h4>Total Pelanggan</h4><p id="pelanggan">0</p></div>
        <div class="card"><h4>Total Kendaraan</h4><p id="kendaraan">0</p></div>
        <div class="card"><h4>Total Transaksi</h4><p id="transaksi">0</p></div>
        <div class="card"><h4>Berkas Selesai</h4><p id="selesai">0</p></div>
    </div>

    <div class="menu">
        <h3>Menu Operasional</h3><br>
        <div class="menu-grid">
            <a href="pelanggan.html">👤 Pelanggan</a>
            <a href="kendaraan.html">🚗 Kendaraan</a>
            <a href="transaksi.html">📝 Transaksi</a>
            <a href="tracking.html">🔍 Tracking</a>
            <a href="pelunasan.html">💰 Pelunasan</a>
            <a href="penyerahan_berkas.html">📂 Penyerahan</a>
        </div>
    </div>
</div>

<script>
    function loadDashboard(){
        let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

        let selesai = 0;
        transaksi.forEach(t=>{
            if(t.statusBerkas === "SELESAI") { selesai++; }
        });

        document.getElementById("pelanggan").innerText = pelanggan.length;
        document.getElementById("kendaraan").innerText = kendaraan.length;
        document.getElementById("transaksi").innerText = transaksi.length;
        document.getElementById("selesai").innerText = selesai;
    }

    loadDashboard();
</script>

</body>
</html>
