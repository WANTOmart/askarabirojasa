<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Biro Jasa STNK</title>
    <style>
        * { font-family: Segoe UI, sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #0d47a1; color: white; padding: 20px; border-radius: 10px; }
        .menu { padding: 20px; }
        a { display: block; margin: 10px 0; color: #0d47a1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card"><h3>Total Omzet</h3><h2 id="omzet">Rp 0</h2></div>
    <div class="card"><h3>Laba Bersih (Jasa)</h3><h2 id="laba">Rp 0</h2></div>
    <div class="card"><h3>Total Piutang</h3><h2 id="piutang">Rp 0</h2></div>
</div>

<div class="menu">
    <a href="transaksi.html">1. Input Transaksi</a>
    <a href="pelunasan.html">2. Pelunasan</a>
    <a href="penyerahan_berkas.html">3. Penyerahan Berkas</a>
    <a href="pengeluaran.html">4. Catat Pengeluaran</a>
</div>

<script>
    function updateDashboard() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let pengeluaran = JSON.parse(localStorage.getItem("dataPengeluaran")) || [];
        
        let totalOmzet = 0;
        let totalJasa = 0;
        let totalPiutang = 0;
        let totalKeluar = 0;

        transaksi.forEach(t => {
            totalOmzet += Number(t.total);
            totalJasa += Number(t.jasa);
            totalPiutang += Number(t.sisa);
        });

        pengeluaran.forEach(p => {
            totalKeluar += Number(p.jumlah);
        });

        // Laba = Total Jasa - Biaya Pengeluaran Kantor
        let labaBersih = totalJasa - totalKeluar;

        document.getElementById("omzet").innerText = "Rp " + totalOmzet.toLocaleString();
        document.getElementById("laba").innerText = "Rp " + labaBersih.toLocaleString();
        document.getElementById("piutang").innerText = "Rp " + totalPiutang.toLocaleString();
    }

    updateDashboard();
</script>
</body>
</html>
