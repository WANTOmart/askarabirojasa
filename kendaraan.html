<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kendaraan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { margin-bottom: 20px; color: #0d47a1; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #2e7d32; color: white; }
        .btn-back { background: #546e7a; color: white; margin-bottom: 10px; display: inline-block; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-del { background: #c62828; color: white; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">Kembali ke Dashboard</a>
    <h2>Data Kendaraan</h2>
    
    <div class="form-group">
        <select id="pilihPelanggan">
            <option value="">-- Pilih Pelanggan (Pengurus) --</option>
        </select>
        <input type="text" id="namaStnk" placeholder="Nama di STNK">
        <input type="text" id="nopol" placeholder="Nomor Polisi">
        <input type="text" id="merk" placeholder="Merk/Tipe Kendaraan">
        <button class="btn-add" onclick="tambahKendaraan()">Tambah Kendaraan</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pengurus</th>
                <th>Nama di STNK</th>
                <th>No. Polisi</th>
                <th>Merk</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelKendaraan"></tbody>
    </table>
</div>

<script>
    function loadPelangganOptions() {
        let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let select = document.getElementById("pilihPelanggan");
        pelanggan.forEach(p => {
            let opt = document.createElement("option");
            opt.value = p.nama;
            opt.innerHTML = p.nama;
            select.appendChild(opt);
        });
    }

    function tampilkanKendaraan() {
        let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
        let html = "";
        kendaraan.forEach((k, index) => {
            html += `<tr>
                <td>${k.pengurus}</td>
                <td>${k.namaStnk}</td>
                <td>${k.nopol}</td>
                <td>${k.merk}</td>
                <td><button class="btn-del" onclick="hapusKendaraan(${index})">Hapus</button></td>
            </tr>`;
        });
        document.getElementById("tabelKendaraan").innerHTML = html;
    }

    function tambahKendaraan() {
        let pengurus = document.getElementById("pilihPelanggan").value;
        let namaStnk = document.getElementById("namaStnk").value;
        let nopol = document.getElementById("nopol").value;
        let merk = document.getElementById("merk").value;

        if(pengurus && namaStnk && nopol && merk) {
            let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
            kendaraan.push({pengurus, namaStnk, nopol, merk});
            localStorage.setItem("dataKendaraan", JSON.stringify(kendaraan));
            
            // Reset input
            document.getElementById("namaStnk").value = "";
            document.getElementById("nopol").value = "";
            document.getElementById("merk").value = "";
            tampilkanKendaraan();
        } else {
            alert("Harap isi semua kolom!");
        }
    }

    function hapusKendaraan(index) {
        let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
        kendaraan.splice(index, 1);
        localStorage.setItem("dataKendaraan", JSON.stringify(kendaraan));
        tampilkanKendaraan();
    }

    loadPelangganOptions();
    tampilkanKendaraan();
</script>

</body>
</html>
