<script>
    // Pastikan script berjalan setelah HTML selesai dimuat
    document.addEventListener("DOMContentLoaded", function() {
        let dataPelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let dataKendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

        // Mengisi datalist pelanggan dengan pengecekan null
        function inisialisasiDatalist() {
            let datalist = document.getElementById("listPelanggan");
            if (!datalist) return; // Mencegah error jika id tidak ditemukan
            
            datalist.innerHTML = "";
            dataPelanggan.forEach(p => {
                let option = document.createElement("option");
                option.value = p.nama;
                datalist.appendChild(option);
            });
        }

        // Mencari otomatis saat mengetik nama pelanggan
        window.cariPelangganOtomatis = function() {
            let input = document.getElementById("namaPelanggan");
            let infoBox = document.getElementById("infoPencarian");
            if (!input) return;

            let inputNama = input.value.trim().toUpperCase();
            let pelangganDitemukan = dataPelanggan.find(p => p.nama.trim().toUpperCase() === inputNama);

            if (pelangganDitemukan) {
                document.getElementById("stnk").value = pelangganDitemukan.stnk;
                infoBox.innerText = "✓ Ditemukan";
            } else {
                document.getElementById("stnk").value = "";
                infoBox.innerText = "";
            }
        };

        // Menampilkan data ke tabel
        function render(){
            let tabel = document.getElementById("isiTabel");
            if (!tabel) return;

            let html = "";
            dataKendaraan.forEach((k, index)=>{
                html += `<tr>
                    <td>${k.namaPelanggan}</td>
                    <td>${k.stnk}</td>
                    <td>${k.noPlat}</td>
                    <td>${k.noRangka}</td>
                    <td>${k.noMesin}</td>
                    <td>${k.merk}</td>
                    <td>${k.jenis}</td>
                    <td><button onclick="hapusData(${index})" style="background:#d32f2f; color:white; border:none; padding:5px 10px; cursor:pointer;">Hapus</button></td>
                </tr>`;
            });
            tabel.innerHTML = html;
        }

        // Fungsi Hapus
        window.hapusData = function(index) {
            if(confirm("Yakin ingin menghapus data ini?")) {
                dataKendaraan.splice(index, 1);
                localStorage.setItem("dataKendaraan", JSON.stringify(dataKendaraan));
                render();
            }
        };

        // Simpan data
        window.simpan = function(){
            let nama = document.getElementById("namaPelanggan").value.trim();
            let stnk = document.getElementById("stnk").value.trim();
            let plat = document.getElementById("noPlat").value.trim();
            let rangka = document.getElementById("noRangka").value.trim();
            let mesin = document.getElementById("noMesin").value.trim();
            let merk = document.getElementById("merk").value.trim();
            let jenis = document.getElementById("jenis").value;

            if(!nama || !stnk || !plat || !rangka || !mesin || !merk || !jenis) {
                alert("Harap isi semua kolom!");
                return;
            }

            dataKendaraan.push({namaPelanggan: nama, stnk: stnk, noPlat: plat, noRangka: rangka, noMesin: mesin, merk: merk, jenis: jenis});
            localStorage.setItem("dataKendaraan", JSON.stringify(dataKendaraan));
            
            // Bersihkan input
            document.getElementById("namaPelanggan").value = "";
            document.getElementById("stnk").value = "";
            document.getElementById("noPlat").value = "";
            document.getElementById("noRangka").value = "";
            document.getElementById("noMesin").value = "";
            document.getElementById("merk").value = "";
            document.getElementById("jenis").value = "";
            document.getElementById("infoPencarian").innerText = "";
            
            render();
            alert("Data tersimpan");
        };

        // Inisialisasi awal
        inisialisasiDatalist();
        render();
    });
</script>
