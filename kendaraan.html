<script>
    let dataPelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
    let dataKendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

    // Fungsi menampilkan daftar pelanggan di pilihan dropdown
    function muatPilihanPelanggan() {
        let select = document.getElementById("pilihPelanggan");
        // Kosongkan dulu opsi bawaan kecuali yang pertama
        select.innerHTML = '<option value="">-- Pilih Pelanggan --</option>';
        
        dataPelanggan.forEach((p, index) => {
            let option = document.createElement("option");
            option.value = index; // Menyimpan index array pelanggan
            option.text = p.nama;
            select.add(option);
        });
    }

    // FUNGSI INI SUDAH DIPERBAIKI (Sudah tidak error)
    function isiNamaStnkOtomatis() {
        let indexTerpilih = document.getElementById("pilihPelanggan").value;
        if(indexTerpilih !== "") {
            // Membaca data STNK asli berdasarkan pelanggan yang dipilih
            document.getElementById("stnk").value = dataPelanggan[indexTerpilih].stnk;
        } else {
            document.getElementById("stnk").value = "";
        }
    }

    function render(){
        let html = "";
        dataKendaraan.forEach((k)=>{
            html += `
            <tr>
                <td>${k.namaPelanggan}</td>
                <td><strong>${k.stnk}</strong></td>
                <td><strong>${k.noPlat.toUpperCase()}</strong></td>
                <td>${k.merk}</td>
                <td>${k.jenis}</td>
            </tr>
            `;
        });
        document.getElementById("isiTabel").innerHTML = html;
        localStorage.setItem("dataKendaraan", JSON.stringify(dataKendaraan));
    }

    function simpan(){
        let indexPelanggan = document.getElementById("pilihPelanggan").value;
        let noPlat = document.getElementById("noPlat").value;
        let merk = document.getElementById("merk").value;
        let jenis = document.getElementById("jenis").value;

        if(indexPelanggan === "" || noPlat==="" || merk==="" || jenis==="") {
            alert("Lengkapi semua data!");
            return;
        }

        let pelangganTerpilih = dataPelanggan[indexPelanggan];

        dataKendaraan.push({
            id: Date.now(),
            namaPelanggan: pelangganTerpilih.nama,
            stnk: pelangganTerpilih.stnk,
            noPlat: noPlat,
            merk: merk,
            jenis: jenis
        });

        render();

        // Reset form setelah simpan
        document.getElementById("pilihPelanggan").value = "";
        document.getElementById("stnk").value = "";
        document.getElementById("noPlat").value = "";
        document.getElementById("merk").value = "";
        document.getElementById("jenis").value = "";
    }

    // Jalankan fungsi awal saat halaman dibuka
    muatPilihanPelanggan();
    render();
</script>
