<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Kendaraan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
padding:10px 15px;
border-radius:6px;
text-decoration:none;
color:white;
font-weight:bold;
}

.back{
background:#546e7a;
}

.save{
background:#0d47a1;
border:none;
cursor:pointer;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
margin-bottom:20px;
}

input,select{
padding:12px;
border:1px solid #ddd;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0d47a1;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.hapus{
background:#c62828;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="container">

<div class="header">

<a href="dashboard.html" class="btn back">
⬅ Dashboard
</a>

<h2>Data Kendaraan</h2>

</div>

<div class="form-grid">

<select id="pelanggan">
<option value="">Pilih Nama STNK</option>
</select>

<input type="text"
id="plat"
placeholder="Plat Nomor">

<input type="text"
id="merk"
placeholder="Merk / Type">

<input type="text"
id="rangka"
placeholder="Nomor Rangka">

<input type="text"
id="mesin"
placeholder="Nomor Mesin">

<button
class="save"
onclick="simpan()">

Simpan Kendaraan

</button>

</div>

<table>

<thead>

<tr>

<th>Nama STNK</th>
<th>Plat Nomor</th>
<th>Merk/Type</th>
<th>No Rangka</th>
<th>No Mesin</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="isiTabel">

</tbody>

</table>

</div>

<script>

let pelanggan =
JSON.parse(
localStorage.getItem("dataPelanggan")
) || [];

let dataKendaraan =
JSON.parse(
localStorage.getItem("dataKendaraan")
) || [];

function loadPelanggan(){

let opsi =
document.getElementById("pelanggan");

pelanggan.forEach(p=>{

opsi.innerHTML += `
<option value="${p.stnk}">
${p.stnk}
</option>
`;

});

}

function render(){

let html="";

dataKendaraan.forEach((k,index)=>{

html += `

<tr>

<td>${k.stnk}</td>

<td>${k.plat}</td>

<td>${k.merk}</td>

<td>${k.rangka}</td>

<td>${k.mesin}</td>

<td>

<button
class="hapus"
onclick="hapus(${index})">

Hapus

</button>

</td>

</tr>

`;

});

document.getElementById("isiTabel")
.innerHTML = html;

localStorage.setItem(
"dataKendaraan",
JSON.stringify(dataKendaraan)
);

}

function simpan(){

let stnk =
document.getElementById("pelanggan").value;

let plat =
document.getElementById("plat").value;

let merk =
document.getElementById("merk").value;

let rangka =
document.getElementById("rangka").value;

let mesin =
document.getElementById("mesin").value;

if(
stnk==="" ||
plat==="" ||
merk==="")
{
alert("Lengkapi data");
return;
}

dataKendaraan.push({

id:Date.now(),

stnk:stnk,

plat:plat,

merk:merk,

rangka:rangka,

mesin:mesin

});

render();

document.getElementById("plat").value="";
document.getElementById("merk").value="";
document.getElementById("rangka").value="";
document.getElementById("mesin").value="";

}

function hapus(index){

if(confirm("Hapus kendaraan?")){

dataKendaraan.splice(index,1);

render();

}

}

loadPelanggan();

render();

</script>

</body>
</html>
