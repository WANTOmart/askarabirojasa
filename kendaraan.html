<script>
    function renderKendaraan() {
        let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
        let tbody = document.getElementById("listKendaraan");
        tbody.innerHTML = "";

        kendaraan.forEach((k, index) => {
            let row = `<tr>
                <td>${k.noPlat}</td>
                <td>${k.merk}</td>
                <td>
                    <a href="edit_kendaraan.html?id=${index}" style="color: blue;">Edit</a>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
    renderKendaraan();
</script>
