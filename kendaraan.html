<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Kendaraan</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #0d47a1; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #0d47a1; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>Tambah Kendaraan</h2>
    <input type="text" id="plat" placeholder="Plat Nomor">
    <input type="text" id="pemilik" placeholder="Nama Pemilik">
    <button onclick="tambahBaris()">Tambah Data (+)</button>

    <table id="tabelKendaraan">
        <thead>
            <tr>
                <th>Plat Nomor</th>
                <th>Pemilik</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>L 1234 AB</td>
                <td>Budi Santoso</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function tambahBaris() {
        // 1. Ambil nilai dari input
        var plat = document.getElementById("plat").value;
        var pemilik = document.getElementById("pemilik").value;

        // 2. Cek apakah input kosong
        if (plat === "" || pemilik === "") {
            alert("Harap isi Plat dan Pemilik!");
            return;
        }

        // 3. Tambahkan ke tabel
        var table = document.getElementById("tabelKendaraan").getElementsByTagName('tbody')[0];
        var newRow = table.insertRow();
        var cell1 = newRow.insertCell(0);
        var cell2 = newRow.insertCell(1);

        cell1.innerHTML = plat;
        cell2.innerHTML = pemilik;

        // 4. Reset input
        document.getElementById("plat").value = "";
        document.getElementById("pemilik").value = "";
        
        console.log("Data berhasil ditambah!");
    }
</script>

</body>
</html>
