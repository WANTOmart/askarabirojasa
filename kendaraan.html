<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Kendaraan</title>

<style>

body{
    font-family:Segoe UI,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

input,select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    background:#0d47a1;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0d47a1;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.btn-hapus{
    background:#c62828;
}

</style>

</head>
<body>

<div class="container">

<h2>DATA KENDARAAN</h2>

<div class="form-grid">

<select id="pelangganSelect">
<option value="">Pilih Nama STNK</option>
</select>

<input
type="text"
id="pemilik"
placeholder="Nama Pemilik STNK"
readonly>

<input
type="text"
id="plat"
placeholder="Plat Nomor">

<input
type="text"
id="merk"
placeholder="Merk / Type">

<input
type="text"
id="rangka"
placeholder="Nomor Rangka">

<input
type="text"
id="mesin"
placeholder="Nomor Mesin">

<select id="jenis">
<option value="Motor">Motor</option>
<option value="Mobil">Mobil</option>
</select>

<button onclick="simpanKendaraan()">
Simpan Kendaraan
</button>

</div>

<table>

<thead>
<tr>
<th>Pemilik STNK</th>
<th>Plat</th>
<th>Merk</th>
<th>Jenis</th>
<th>Rangka</th>
<th>Mesin</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="isiTabel"></tbody>

</table>

</div>

<script>

// ambil pelanggan
let dataPelanggan =
JSON.parse(
localStorage.getItem("dataPelanggan")
) || [];

let dataKendaraan =
JSON.parse(
localStorage.getItem("dataKendaraan")
) || [];

// isi dropdown pelanggan
function loadPelanggan(){

let select =
document.getElementById(
"pelangganSelect"
);

select.innerHTML =
'<option value="">Pilih Nama STNK</option>';

dataPelanggan.forEach((p,index)=>{

select.innerHTML += `
<option value="${index}">
${p.namaStnk}
</option>
`;

});

}

document
.getElementById("pelangganSelect")
.addEventListener("change",function(){

let index = this.value;

if(index===""){

document
.getElementById("pemilik")
.value = "";

return;

}

document
.getElementById("pemilik")
.value =
dataPelanggan[index].namaStnk;

});

function simpanKendaraan(){

let index =
document.getElementById(
"pelangganSelect"
).value;

if(index===""){
alert("Pilih pelanggan");
return;
}

let kendaraan = {

id:
"KDR-" +
Date.now(),

pelangganId:
dataPelanggan[index].id,

namaPelanggan:
dataPelanggan[index].nama,

namaStnk:
dataPelanggan[index].namaStnk,

hp:
dataPelanggan[index].hp,

plat:
document.getElementById(
"plat"
).value,

merk:
document.getElementById(
"merk"
).value,

rangka:
document.getElementById(
"rangka"
).value,

mesin:
document.getElementById(
"mesin"
).value,

jenis:
document.getElementById(
"jenis"
).value

};

dataKendaraan.push(kendaraan);

localStorage.setItem(
"dataKendaraan",
JSON.stringify(dataKendaraan)
);

renderTabel();

alert("Data kendaraan berhasil disimpan");

document.getElementById("plat").value="";
document.getElementById("merk").value="";
document.getElementById("rangka").value="";
document.getElementById("mesin").value="";
}

function renderTabel(){

let tbody =
document.getElementById(
"isiTabel"
);

tbody.innerHTML="";

dataKendaraan.forEach((k,index)=>{

tbody.innerHTML += `
<tr>

<td>${k.namaStnk}</td>

<td>${k.plat}</td>

<td>${k.merk}</td>

<td>${k.jenis}</td>

<td>${k.rangka}</td>

<td>${k.mesin}</td>

<td>
<button
class="btn-hapus"
onclick="hapus(${index})">
Hapus
</button>
</td>

</tr>
`;

});

}

function hapus(index){

if(confirm(
"Hapus data kendaraan?"
)){

dataKendaraan.splice(index,1);

localStorage.setItem(
"dataKendaraan",
JSON.stringify(dataKendaraan)
);

renderTabel();

}

}

loadPelanggan();
renderTabel();

</script>

</body>
</html>
