<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Kendaraan - Askara Zayyan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #0d47a1; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0d47a1; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .badge-mobil { background: #e3f2fd; color: #0d47a1; }
        .badge-motor { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tambah Data Kendaraan</h2>
    <div class="form-grid">
        <input type="text" id="plat" placeholder="Plat Nomor">
        <input type="text" id="pemilik" placeholder="Nama Pemilik">
        <input type="text" id="merk" placeholder="Merk / Tipe">
        <select id="jenis">
            <option value="Mobil">Mobil</option>
            <option value="Motor">Motor</option>
        </select>
        <input type="text" id="rangka" placeholder="No. Rangka">
        <input type="text" id="mesin" placeholder="No. Mesin">
        <button onclick="tambahData()">Tambah Data (+)</button>
    </div>

    <table id="tabelKendaraan">
        <thead>
            <tr>
                <th>Plat Nomor</th>
                <th>Pemilik</th>
                <th>Merk / Tipe</th>
                <th>Jenis</th>
                <th>No. Rangka</th>
                <th>No. Mesin</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    // Memuat data dari LocalStorage
    let dataKendaraan = JSON.parse(localStorage.getItem("dataK")) || [];

    function renderTabel() {
        let tbody = document.getElementById("isiTabel");
        tbody.innerHTML = "";
        dataKendaraan.forEach(item => {
            let badge = item.jenis === "Mobil" ? "badge-mobil" : "badge-motor";
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.plat}</strong></td>
                    <td>${item.pemilik}</td>
                    <td>${item.merk}</td>
                    <td><span class="badge ${badge}">${item.jenis}</span></td>
                    <td>${item.rangka}</td>
                    <td>${item.mesin}</td>
                </tr>
            `;
        });
    }

    function tambahData() {
        let newData = {
            plat: document.getElementById("plat").value,
            pemilik: document.getElementById("pemilik").value,
            merk: document.getElementById("merk").value,
            jenis: document.getElementById("jenis").value,
            rangka: document.getElementById("rangka").value,
            mesin: document.getElementById("mesin").value
        };

        if(!newData.plat || !newData.pemilik) { alert("Isi Plat dan Pemilik!"); return; }

        dataKendaraan.push(newData);
        localStorage.setItem("dataK", JSON.stringify(dataKendaraan));
        renderTabel();
        
        // Bersihkan input
        document.querySelectorAll("input").forEach(input => input.value = "");
    }

    renderTabel();
</script>

</body>
</html>
