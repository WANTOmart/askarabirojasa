<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pelanggan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { margin-bottom: 20px; color: #0d47a1; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #2e7d32; color: white; width: 100%; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; display: inline-block; text-decoration: none; border-radius: 5px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-del { background: #c62828; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
    <h2>Data Pelanggan & Nama STNK</h2>
    
    <div class="form-group">
        <input type="text" id="nama" placeholder="Nama Pelanggan (Pengurus)">
        <input type="text" id="namaStnk" placeholder="Nama Pemilik di STNK Asli">
        <input type="text" id="hp" placeholder="No. HP Pelanggan">
        <button class="btn-add" onclick="tambahPelanggan()">Simpan Data Pelanggan</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Nama STNK</th>
                <th>No. HP</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPelanggan"></tbody>
    </table>
</div>

<script>
    function proteksiPegawai() {
        const roleUser = sessionStorage.getItem("loginUser") || "admin";
        if (roleUser.toLowerCase() === "pegawai") {
            document.querySelectorAll(".btn-del").forEach(btn => btn.style.display = "none");
        }
    }

    function tampilkanPelanggan() {
        let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let html = "";
        pelanggan.forEach((p, index) => {
            html += `<tr>
                <td>${p.nama}</td>
                <td>${p.namaStnk}</td>
                <td>${p.hp}</td>
                <td><button class="btn-del" onclick="hapusPelanggan(${index})">Hapus</button></td>
            </tr>`;
        });
        document.getElementById("tabelPelanggan").innerHTML = html;
        proteksiPegawai();
    }

    function tambahPelanggan() {
        let nama = document.getElementById("nama").value;
        let namaStnk = document.getElementById("namaStnk").value;
        let hp = document.getElementById("hp").value;
        
        if(nama && namaStnk && hp) {
            let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
            pelanggan.push({nama, namaStnk, hp});
            localStorage.setItem("dataPelanggan", JSON.stringify(pelanggan));
            
            document.getElementById("nama").value = "";
            document.getElementById("namaStnk").value = "";
            document.getElementById("hp").value = "";
            
            tampilkanPelanggan();
        } else {
            alert("Harap isi semua kolom!");
        }
    }

    function hapusPelanggan(index) {
        const roleUser = sessionStorage.getItem("loginUser") || "admin";
        if (roleUser.toLowerCase() === "pegawai") {
            alert("Akses Ditolak! Pegawai tidak diizinkan menghapus data pelanggan.");
            return;
        }

        if(confirm('Hapus pelanggan ini?')) {
            let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
            pelanggan.splice(index, 1);
            localStorage.setItem("dataPelanggan", JSON.stringify(pelanggan));
            tampilkanPelanggan();
        }
    }

    tampilkanPelanggan();
</script>

</body>
</html>
