<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kendaraan</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
        body{ background:#f4f6f9; padding:20px; }
        .container{ max-width:1100px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
        .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .btn{ padding:10px 15px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; text-decoration:none; color:white; }
        .back{ background:#546e7a; }
        .save{ background:#2e7d32; }
        .form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:20px; }
        input, select { padding:12px; border:1px solid #ddd; border-radius:6px; font-size: 14px; }
        table{ width:100%; border-collapse:collapse; }
        th{ background:#2e7d32; color:white; padding:10px; }
        td{ padding:10px; border-bottom:1px solid #ddd; text-align: center; }
        th { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn back">⬅ Dashboard</a>
        <h2>Data Kendaraan</h2>
    </div>

    <div class="form-grid">
        <select id="pilihPelanggan" onchange="isiNamaStnkOtomatis()">
            <option value="">-- Pilih Pelanggan --</option>
        </select>
        
        <input type="text" id="stnk" placeholder="Nama Asli STNK" readonly style="background: #eee;">
        
        <input type="text" id="noPlat" placeholder="Nomor Polisi (No. Plat)">
        <input type="text" id="merk" placeholder="Merk / Tipe">
        <select id="jenis">
            <option value="">-- Jenis --</option>
            <option value="Motor">Motor</option>
            <option value="Mobil">Mobil</option>
        </select>
        <button class="btn save" onclick="simpan()">Simpan</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pemilik (Pelanggan)</th>
                <th>Nama Asli STNK</th>
                <th>No. Plat</th>
                <th>Merk & Tipe</th>
                <th>Jenis</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataPelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
    let dataKendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

    // Fungsi menampilkan daftar pelanggan di pilihan dropdown
    function muatPilihanPelanggan() {
        let select = document.getElementById("pilihPelanggan");
        dataPelanggan.forEach((p, index) => {
            let option = document.createElement("option");
            option.value = index; // Menyimpan index array pelanggan
            option.text = p.nama;
            select.add(option);
        });
    }

    // Fungsi otomatis mengisi Nama STNK saat nama pelanggan dipilih
    function isiNamaStnkOtomatis() {
        let indexTerpilih = document.getElementById("pilihPelanggan").value;
        if(indexTerpilih !== "") {
            document.getElementById("stnk").value = dataPelanggan[indexTerpilled].stnk;
        } else {
            document.getElementById("stnk").value = "";
        }
    }

    function render(){
        let html = "";
        dataKendaraan.forEach((k)=>{
            html += `
            <tr>
                <td>${k.namaPelanggan}</td>
                <td><strong>${k.stnk}</strong></td>
                <td><strong>${k.noPlat.toUpperCase()}</strong></td>
                <td>${k.merk}</td>
                <td>${k.jenis}</td>
            </tr>
            `;
        });
        document.getElementById("isiTabel").innerHTML = html;
        localStorage.setItem("dataKendaraan", JSON.stringify(dataKendaraan));
    }

    function simpan(){
        let indexPelanggan = document.getElementById("pilihPelanggan").value;
        let noPlat = document.getElementById("noPlat").value;
        let merk = document.getElementById("merk").value;
        let jenis = document.getElementById("jenis").value;

        if(indexPelanggan === "" || noPlat==="" || merk==="" || jenis==="") {
            alert("Lengkapi semua data!");
            return;
        }

        let pelangganTerpilih = dataPelanggan[indexPelanggan];

        dataKendaraan.push({
            id: Date.now(),
            namaPelanggan: pelangganTerpilih.nama,
            stnk: pelangganTerpilih.stnk,
            noPlat: noPlat,
            merk: merk,
            jenis: jenis
        });

        render();

        // Reset form
        document.getElementById("pilihPelanggan").value = "";
        document.getElementById("stnk").value = "";
        document.getElementById("noPlat").value = "";
        document.getElementById("merk").value = "";
        document.getElementById("jenis").value = "";
    }

    // Jalankan fungsi awal
    muatPilihanPelanggan();
    render();
</script>
</body>
</html>
