<table border="1" id="tabelPelanggan">
    <thead>
        <tr>
            <th>Nama</th>
            <th>No. Telp</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="listPelanggan"></tbody>
</table>

<script>
    function renderPelanggan() {
        let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let tbody = document.getElementById("listPelanggan");
        tbody.innerHTML = "";

        pelanggan.forEach((p, index) => {
            let row = `<tr>
                <td>${p.nama}</td>
                <td>${p.telepon}</td>
                <td>
                    <a href="edit_pelanggan.html?id=${index}" style="color: blue;">Ubah</a>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
    renderPelanggan();
</script>
