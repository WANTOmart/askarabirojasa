<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pelanggan</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
        body{ background:#f4f6f9; padding:20px; }
        .container{ max-width:1100px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
        .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .btn{ padding:10px 15px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; text-decoration:none; color:white; }
        .back{ background:#546e7a; }
        .save{ background:#0d47a1; }
        .btn-hapus{ background:#d32f2f; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer; }
        .btn-hapus:hover { background:#b71c1c; }
        .form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:10px; margin-bottom:20px; }
        input{ padding:12px; border:1px solid #ddd; border-radius:6px; }
        table{ width:100%; border-collapse:collapse; }
        th{ background:#0d47a1; color:white; padding:10px; }
        td{ padding:10px; border-bottom:1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn back">⬅ Dashboard</a>
        <h2>Data Pelanggan</h2>
    </div>

    <div class="form-grid">
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="text" id="telepon" placeholder="No Telepon">
        <input type="text" id="stnk" placeholder="Nama Asli STNK">
        <button class="btn save" onclick="simpan()">Simpan Pelanggan</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nama Lengkap</th>
                <th>No Telepon</th>
                <th>Nama STNK</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataPelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];

    function render(){
        let html = "";
        dataPelanggan.forEach((p)=>{
            html += `
            <tr>
                <td>${p.nama}</td>
                <td>${p.telepon}</td>
                <td>${p.stnk}</td>
                <td><button class="btn-hapus" onclick="hapus(${p.id})">Hapus</button></td>
            </tr>
            `;
        });

        document.getElementById("isiTabel").innerHTML = html;
        localStorage.setItem("dataPelanggan", JSON.stringify(dataPelanggan));
    }

    function simpan(){
        let nama = document.getElementById("nama").value;
        let telepon = document.getElementById("telepon").value;
        let stnk = document.getElementById("stnk").value;

        if(nama==="" || telepon==="" || stnk==="") {
            alert("Lengkapi data");
            return;
        }

        dataPelanggan.push({
            id: Date.now(),
            nama: nama,
            telepon: telepon,
            stnk: stnk
        });

        render();

        document.getElementById("nama").value="";
        document.getElementById("telepon").value="";
        document.getElementById("stnk").value="";
    }

    function hapus(id){
        if(confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            dataPelanggan = dataPelanggan.filter(p => p.id !== id);
            render();
        }
    }

    render();
</script>

</body>
</html>
