<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelunasan</title>
    <style>
        * { font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .btn-back-box { display: inline-block; padding: 10px 20px; border: 2px solid #546e7a; border-radius: 8px; color: #546e7a; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="btn-back-box">← Kembali ke Dashboard</a>
    <h2>Daftar Piutang</h2>
    <table id="tabelPelunasan"></table>
</div>

<script>
    function tampilkanPiutang() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Sisa</th><th>Aksi</th></tr>";
        tr.forEach((t, i) => {
            let sisa = Number(t.total) - Number(t.dp);
            if (sisa > 0) {
                html += `<tr><td>${t.pengurus}</td><td>Rp ${sisa.toLocaleString()}</td>
                <td><button onclick="lunasi(${i})">LUNAS</button>
                <button onclick="cetakLunas('${t.pengurus}', ${sisa})">Cetak</button></td></tr>`;
            }
        });
        document.getElementById("tabelPelunasan").innerHTML = html;
    }

    function cetakLunas(nama, sisa) {
        let w = window.open('', '_blank');
        w.document.write(`<html><body style="text-align:center; font-family:sans-serif;">
            <img src="logo-az.jpeg" style="width:120px;">
            <h2>Kwitansi Pelunasan</h2>
            <p>Diterima dari: <b>${nama}</b></p>
            <p>Jumlah Pelunasan: <b>Rp ${sisa.toLocaleString()}</b></p>
            <p>Status: <b>LUNAS</b></p></body></html>`);
        w.print();
    }
    tampilkanPiutang();
</script>
</body>
</html>
