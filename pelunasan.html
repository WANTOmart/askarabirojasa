<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelunasan Pembayaran</title>
    <style>
        * { box-sizing: border-box; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { color: #0d47a1; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-pay { background: #0277bd; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
        .lunas { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
    <h2>Data Piutang & Pelunasan</h2>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Kendaraan</th>
                <th>Total</th>
                <th>DP</th>
                <th>Sisa Piutang</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPelunasan"></tbody>
    </table>
</div>

<script>
    function tampilkanPiutang() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        
        transaksi.forEach((t, index) => {
            if (t.sisa > 0) {
                html += `<tr>
                    <td>${t.pelanggan}</td>
                    <td>${t.kendaraan}</td>
                    <td>Rp ${t.biaya.toLocaleString()}</td>
                    <td>Rp ${t.dp.toLocaleString()}</td>
                    <td><strong>Rp ${t.sisa.toLocaleString()}</strong></td>
                    <td><button class="btn-pay" onclick="lunasi(${index})">Lunasi</button></td>
                </tr>`;
            }
        });
        
        if (html === "") html = "<tr><td colspan='6' style='text-align:center;'>Tidak ada piutang. Semua sudah lunas!</td></tr>";
        document.getElementById("tabelPelunasan").innerHTML = html;
    }

    function lunasi(index) {
        if(confirm("Apakah Anda yakin ingin melunasi transaksi ini?")) {
            let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            
            // Update DP agar sama dengan biaya (lunas)
            transaksi[index].dp = transaksi[index].biaya;
            transaksi[index].sisa = 0;
            
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            alert("Pembayaran telah dilunasi!");
            tampilkanPiutang();
        }
    }

    tampilkanPiutang();
</script>

</body>
</html>
