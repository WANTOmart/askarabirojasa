<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelunasan</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html">← Kembali</a>
    <h2>Daftar Piutang</h2>
    <table id="tabelPelunasan"></table>
</div>

<script>
    function tampilkanPiutang() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Total</th><th>DP</th><th>Sisa</th><th>Aksi</th></tr>";
        tr.forEach((t, i) => {
            let total = Number(t.total);
            let dp = Number(t.dp);
            let sisa = total - dp;
            if (sisa > 0) {
                html += `<tr><td>${t.pengurus}</td><td>Rp ${total.toLocaleString('id-ID')}</td>
                <td>Rp ${dp.toLocaleString('id-ID')}</td><td>Rp ${sisa.toLocaleString('id-ID')}</td>
                <td><button onclick="lunasi(${i})">LUNAS</button>
                <button onclick="cetakLunas('${t.pengurus}', ${sisa})">Cetak</button></td></tr>`;
            }
        });
        document.getElementById("tabelPelunasan").innerHTML = html;
    }

    function lunasi(i) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
        tr[i].dp = tr[i].total; // DP jadi sama dengan total agar sisa 0
        localStorage.setItem("dataTransaksi", JSON.stringify(tr));
        tampilkanPiutang();
    }
function cetakDP(nama, dp) {
    let w = window.open('', '_blank');
    w.document.write(`
        <html>
            <head>
                <style>
                    body { font-family: sans-serif; text-align: center; }
                    .logo { width: 150px; margin-bottom: 10px; }
                    .content { text-align: left; display: inline-block; }
                </style>
            </head>
            <body>
                <img src="logo-az.jpeg" class="logo">
                <h2>Kwitansi DP</h2>
                <div class="content">
                    <p>Diterima dari: <b>${nama}</b></p>
                    <p>Nominal DP: <b>Rp ${dp.toLocaleString('id-ID')}</b></p>
                    <p>Status: Pembayaran Awal</p>
                </div>
            </body>
        </html>`);
    w.print();
}

function cetakLunas(nama, sisa) {
    let w = window.open('', '_blank');
    w.document.write(`
        <html>
            <head>
                <style>
                    body { font-family: sans-serif; text-align: center; }
                    .logo { width: 150px; margin-bottom: 10px; }
                    .content { text-align: left; display: inline-block; }
                </style>
            </head>
            <body>
                <img src="logo-az.jpeg" class="logo">
                <h2>Kwitansi Pelunasan</h2>
                <div class="content">
                    <p>Diterima dari: <b>${nama}</b></p>
                    <p>Nominal Pelunasan: <b>Rp ${sisa.toLocaleString('id-ID')}</b></p>
                    <p>Status: <b>LUNAS</b></p>
                </div>
            </body>
        </html>`);
    w.print();
}
    tampilkanPiutang();
</script>
</body>
</html>
