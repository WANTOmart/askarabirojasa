<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelunasan Piutang</title>
    <style>
        body { font-family: Segoe UI, sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-lunas { background: #2e7d32; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .btn-cetak { background: #0288d1; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html">← Kembali</a>
    <h2>Daftar Piutang Pelanggan</h2>
    <table id="tabelPelunasan"></table>
</div>

<script>
    function tampilkanPiutang() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Total</th><th>DP</th><th>Sisa</th><th>Aksi</th></tr>";
        let adaPiutang = false;

        tr.forEach((t, i) => {
            let total = Number(t.total);
            let dp = Number(t.dp);
            let sisa = total - dp;
            
            if (sisa > 0) {
                adaPiutang = true;
                html += `<tr>
                    <td>${t.pengurus}</td>
                    <td>Rp ${total.toLocaleString('id-ID')}</td>
                    <td>Rp ${dp.toLocaleString('id-ID')}</td>
                    <td><b>Rp ${sisa.toLocaleString('id-ID')}</b></td>
                    <td>
                        <button class="btn-lunas" onclick="lunasi(${i})">LUNAS</button>
                        <button class="btn-cetak" onclick="cetakLunas('${t.pengurus}', ${sisa})">Cetak</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById("tabelPelunasan").innerHTML = adaPiutang ? html : "<tr><td colspan='5'>Tidak ada piutang.</td></tr>";
    }

    function lunasi(i) {
        if(confirm('Ubah status transaksi ini menjadi Lunas?')) {
            let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
            tr[i].dp = tr[i].total; 
            localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            tampilkanPiutang();
        }
    }

    function cetakLunas(nama, sisa) {
        let w = window.open('', '_blank');
        w.document.write(`
            <html>
                <head>
                    <style>
                        body { font-family: sans-serif; text-align: center; }
                        .logo { width: 120px; }
                    </style>
                </head>
                <body>
                    <img src="logo-az.jpeg" class="logo">
                    <h2>Kwitansi Pelunasan</h2>
                    <div style="text-align: left; display: inline-block;">
                        <p>Diterima dari: <b>${nama}</b></p>
                        <p>Jumlah Pelunasan: <b>Rp ${sisa.toLocaleString('id-ID')}</b></p>
                        <p>Status: <b>LUNAS</b></p>
                    </div>
                    <br><br><br>
                    <p>Tanda Tangan,</p><br><br>
                    <p>(BIRO JASA ASKARA ZAYYAN)</p>
                </body>
            </html>
        `);
        w.print();
    }
    tampilkanPiutang();
</script>
</body>
</html>
