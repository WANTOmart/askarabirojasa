<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelunasan Piutang</title>
    <style>
        body { font-family: Segoe UI, sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .btn-back-box { display: inline-block; padding: 10px 20px; border: 2px solid #546e7a; border-radius: 8px; color: #546e7a; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .btn-back-box:hover { background-color: #546e7a; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        .btn-lunas { background-color: #2e7d32; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn-print { background-color: #0288d1; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn-del { background-color: #c62828; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html" class="btn-back-box">← Kembali ke Dashboard</a>
    <h2>Daftar Piutang</h2>
    <table id="tabelPelunasan"></table>
</div>

<script>
    function tampilkanPiutang() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Sisa</th><th>Aksi</th></tr>";
        tr.forEach((t, i) => {
            let sisa = Number(t.total) - Number(t.dp);
            if (sisa > 0) {
                html += `<tr><td>${t.pengurus}</td><td>Rp ${sisa.toLocaleString()}</td>
                <td>
                    <button class="btn-lunas" onclick="lunasi(${i})">LUNAS</button>
                    <button class="btn-print" onclick="cetakLunas('${t.pengurus}', ${sisa})">Cetak</button>
                    <button class="btn-del" onclick="hapusTransaksi(${i})">Hapus</button>
                </td></tr>`;
            }
        });
        document.getElementById("tabelPelunasan").innerHTML = html;
    }
    
    // ... (fungsi lunasi, hapusTransaksi, dan cetakLunas tetap sama)
    tampilkanPiutang();
</script>
</body>
</html>
