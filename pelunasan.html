<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelunasan</title>
    <style>body { font-family: sans-serif; padding: 20px; } table { width: 100%; border-collapse: collapse; }</style>
</head>
<body>
<div class="container">
    <a href="dashboard.html">← Kembali</a>
    <h2>Daftar Piutang</h2>
    <table border="1" id="tabelPelunasan"></table>
</div>

<script>
    function tampilkanPiutang() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Sisa</th><th>Aksi</th></tr>";
        tr.forEach((t, i) => {
            if (t.sisa > 0) {
                html += `<tr><td>${t.pengurus}</td><td>Rp ${Number(t.sisa).toLocaleString()}</td>
                <td><button onclick="lunasi(${i})">LUNAS</button>
                <button onclick="cetakLunas('${t.pengurus}', ${t.sisa})">Cetak</button></td></tr>`;
            }
        });
        document.getElementById("tabelPelunasan").innerHTML = html;
    }

    function lunasi(i) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
        tr[i].sisa = 0;
        localStorage.setItem("dataTransaksi", JSON.stringify(tr));
        tampilkanPiutang();
    }

    function cetakLunas(nama, jumlah) {
        let w = window.open('', '_blank');
        w.document.write(`<html><body><h2>Kwitansi Pelunasan</h2><p>Diterima dari: ${nama}</p><p>Jumlah: Rp ${jumlah.toLocaleString()}</p></body></html>`);
        w.print();
    }
    tampilkanPiutang();
</script>
</body>
</html>
