<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penyerahan Berkas</title>
    <style>
        body { font-family: Segoe UI, sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-serah { background: #0288d1; color: white; padding: 6px 12px; border: none; cursor: pointer; border-radius: 4px; }
        .btn-print { background: #388e3c; color: white; padding: 6px 12px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html">← Kembali ke Dashboard</a>
    <h2>Penyerahan Berkas</h2>
    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Nopol</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPenyerahan"></tbody>
    </table>
</div>

<script>
    function tampilkanPenyerahan() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        tr.forEach((t, index) => {
            html += `<tr>
                <td>${t.pengurus}</td>
                <td>${t.nopol}</td>
                <td>${t.statusBerkas}</td>
                <td>
                    <button class="btn-serah" onclick="serahkan(${index})">Serahkan</button>
                    <button class="btn-print" onclick="cetakTandaTerima('${t.pengurus}', '${t.nopol}')">Cetak Bukti</button>
                </td>
            </tr>`;
        });
        document.getElementById("tabelPenyerahan").innerHTML = html;
    }

    function serahkan(index) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
        tr[index].statusBerkas = "DISERAHKAN";
        localStorage.setItem("dataTransaksi", JSON.stringify(tr));
        tampilkanPenyerahan();
        alert("Status diubah ke DISERAHKAN!");
    }

    function cetakTandaTerima(nama, nopol) {
        let w = window.open('', '_blank');
        w.document.write(`
            <html><body style="font-family:Arial;">
                <h2>TANDA TERIMA BERKAS</h2>
                <p>Telah diterima berkas kendaraan:</p>
                <p>Nama Pelanggan: <b>${nama}</b></p>
                <p>Nomor Polisi: <b>${nopol}</b></p>
                <p>Tanggal: ${new Date().toLocaleDateString()}</p>
                <br><br>
                <table style="width:100%">
                    <tr><td>Yang Menyerahkan</td><td>Yang Menerima</td></tr>
                    <tr style="height:100px;"><td><br>(Biro Jasa Askara Zayyan)</td><td><br>(........................)</td></tr>
                </table>
            </body></html>
        `);
        w.print();
    }
    tampilkanPenyerahan();
</script>
</body>
</html>
