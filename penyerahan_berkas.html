<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyerahan Berkas</title>
    <style>
        * { box-sizing: border-box; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { color: #0d47a1; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-handover { background: #6a1b9a; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-print { background: #0277bd; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
        .status-selesai { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
    <h2>Penyerahan Berkas ke Pelanggan</h2>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Kendaraan</th>
                <th>Status Berkas</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPenyerahan"></tbody>
    </table>
</div>

<script>
    function cetakBukti(index) {
        let t = JSON.parse(localStorage.getItem("dataTransaksi"))[index];
        let win = window.open('', '', 'width=400,height=500');
        win.document.write(`
            <html>
            <body style="font-family: monospace; padding: 20px;" onload="window.print(); window.close();">
                <div style="text-align:center;">
                    <h3>SURAT SERAH TERIMA<br>ASKARA ZAYYAN</h3>
                </div>
                <p>Telah diterima berkas kendaraan:</p>
                <p>Pelanggan: ${t.pelanggan}<br>
                Kendaraan: ${t.kendaraan}<br>
                Layanan: ${t.layanan}</p>
                <br><br>
                <p>Tanda Tangan Pelanggan,</p>
                <br><br><br>
                <p>( ......................... )</p>
            </body>
            </html>
        `);
    }

    function tampilkanPenyerahan() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        
        transaksi.forEach((t, index) => {
            if (t.statusBerkas === "SELESAI") {
                html += `<tr>
                    <td>${t.pelanggan}</td>
                    <td>${t.kendaraan}</td>
                    <td class="status-selesai">Siap Diserahkan</td>
                    <td>
                        <button class="btn-handover" onclick="serahkan(${index})">Serah Terima</button>
                        <button class="btn-print" onclick="cetakBukti(${index})">Cetak</button>
                    </td>
                </tr>`;
            }
        });
        
        if (html === "") html = "<tr><td colspan='4' style='text-align:center;'>Tidak ada berkas siap diserahkan.</td></tr>";
        document.getElementById("tabelPenyerahan").innerHTML = html;
    }

    function serahkan(index) {
        if(confirm("Apakah berkas sudah diserahkan kepada pelanggan?")) {
            let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            transaksi[index].statusBerkas = "DISERAHKAN";
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            tampilkanPenyerahan();
        }
    }

    tampilkanPenyerahan();
</script>

</body>
</html>
