<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyerahan Berkas</title>
    <style>
        body { font-family: Segoe UI, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0d47a1; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        .btn-print { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header no-print">
        <a href="dashboard.html">⬅ Kembali ke Dashboard</a>
        <h2>Penyerahan Berkas Selesai</h2>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Nota</th>
                <th>Nama STNK</th>
                <th>Layanan</th>
                <th>Biaya</th>
                <th>DP</th>
                <th>Sisa</th>
                <th class="no-print">Aksi</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataTransaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

    function render() {
        let html = "";
        dataTransaksi.forEach((t, index) => {
            // Menampilkan hanya transaksi yang statusnya SELESAI
            if (t.statusBerkas === "SELESAI") {
                html += `<tr>
                    <td>${t.nota}</td>
                    <td>${t.stnk}</td>
                    <td>${t.layanan}</td>
                    <td>Rp ${Number(t.biaya).toLocaleString('id-ID')}</td>
                    <td>Rp ${Number(t.dp).toLocaleString('id-ID')}</td>
                    <td>Rp ${Number(t.sisa).toLocaleString('id-ID')}</td>
                    <td class="no-print">
                        <button class="btn-print" onclick="cetak(${index})">Cetak Bukti</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById("isiTabel").innerHTML = html || "<tr><td colspan='7'>Tidak ada berkas selesai.</td></tr>";
    }

    function cetak(index) {
        let t = dataTransaksi[index];
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Bukti Penyerahan</title></head>
            <body style="font-family:sans-serif; padding:20px;">
                <h2 style="text-align:center;">BIRO JASA STNK ASKARA ZAYYAN</h2>
                <hr>
                <p><strong>Nota:</strong> ${t.nota}</p>
                <p><strong>Nama:</strong> ${t.stnk}</p>
                <p><strong>Kendaraan:</strong> ${t.plat} (${t.merk})</p>
                <p><strong>Layanan:</strong> ${t.layanan}</p>
                <hr>
                <p>Biaya Jasa: Rp ${Number(t.biaya).toLocaleString('id-ID')}</p>
                <p>Dibayar (DP): Rp ${Number(t.dp).toLocaleString('id-ID')}</p>
                <p><strong>Sisa Kurangan: Rp ${Number(t.sisa).toLocaleString('id-ID')}</strong></p>
                <hr>
                <p style="text-align:center;">Status: <b>LUNAS</b></p>
                <br>
                <div style="text-align:right;">
                    Tanda Terima,<br><br><br>
                    (..........................)
                </div>
            </body></html>
        `);
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 500);
    }

    render();
</script>
</body>
</html>
