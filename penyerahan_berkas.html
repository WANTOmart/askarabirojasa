<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penyerahan Berkas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .btn-back-box { display: inline-block; padding: 10px 20px; border: 2px solid #546e7a; border-radius: 8px; color: #546e7a; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-back-box:hover { background-color: #546e7a; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; color: #333; }
        input.input-pengambil { width: 100%; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-serah { background: #0288d1; color: white; padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-print { background: #388e3c; color: white; padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 3px; }
        .btn-del { background: #c62828; color: white; padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 3px; }
        .badge-ready { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .badge-delivered { background: #eceff1; color: #455a64; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .badge-process { background: #fff3e0; color: #e65100; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .no-data { text-align: center; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back-box">← Kembali ke Dashboard</a>
    <h2>Penyerahan Berkas Kendaraan</h2>
    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Nopol</th>
                <th>Layanan</th>
                <th>Status Berkas</th>
                <th style="width: 200px;">Nama Pengambil Berkas</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPenyerahan"></tbody>
    </table>
</div>

<script>
    function tampilkanPenyerahan() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        
        if (tr.length === 0) {
            html = `<tr><td colspan="6" class="no-data">Belum ada data transaksi masuk.</td></tr>`;
            document.getElementById("tabelPenyerahan").innerHTML = html;
            return;
        }

        tr.forEach((t, index) => {
            let namaLayanan = t.layanan || "-";
            let pengambilLama = t.namaPengambil || ""; 
            
            let statusBadge = "";
            let kolomInput = "";
            let kolomAksi = ""; // Variabel baru untuk menampung tombol dinamis

            // JIKA STATUS DISERAHKAN (TOMBOL HAPUS DIHILANGKAN)
            if (t.statusBerkas === "DISERAHKAN") {
                statusBadge = `<span class="badge-delivered">DISERAHKAN</span>`;
                kolomInput = `<input type="text" class="input-pengambil" id="pengambil-${index}" value="${pengambilLama}" disabled>`;
                
                // Hanya menampilkan teks Selesai dan tombol Cetak saja
                kolomAksi = `
                    <span style="color:#455a64; font-weight:bold; font-size:13px; margin-right:5px;">✓ Selesai</span>
                    <button class="btn-print" onclick="prosesCetak(${index})">Cetak</button>
                `;
            } else {
                // JIKA BELUM DISERAHKAN (PROSES / SELESAI)
                let labelStatus = t.statusBerkas || "PROSES";
                let kelasStatus = labelStatus === "SELESAI" ? "badge-ready" : "badge-process";
                
                statusBadge = `<span class="${kelasStatus}">${labelStatus}</span>`;
                kolomInput = `<input type="text" class="input-pengambil" id="pengambil-${index}" placeholder="Ketik nama pengambil..." value="${pengambilLama}">`;
                
                // Menampilkan tombol Serah, Cetak, dan Hapus
                kolomAksi = `
                    <button class="btn-serah" onclick="serahkan(${index})">Serah</button>
                    <button class="btn-print" onclick="prosesCetak(${index})">Cetak</button>
                    <button class="btn-del" onclick="hapusTransaksi(${index})">Hapus</button>
                `;
            }

            html += `<tr>
                <td>${t.pengurus}</td>
                <td><strong>${t.nopol}</strong></td>
                <td><small>${namaLayanan}</small></td>
                <td>${statusBadge}</td>
                <td>${kolomInput}</td>
                <td>${kolomAksi}</td>
            </tr>`;
        });

        document.getElementById("tabelPenyerahan").innerHTML = html;
    }

    // FUNGSI UNTUK MENYIMPAN NAMA PENGAMBIL DAN MENGUBAH STATUS MENJADI DISERAHKAN
    function serahkan(index) {
        let namaInput = document.getElementById(`pengambil-${index}`).value.trim();
        
        if (namaInput === "") {
            alert("Mohon isi dahulu 'Nama Pengambil Berkas' sebelum menyerahkan berkas!");
            document.getElementById(`pengambil-${index}`).focus();
            return;
        }

        if(confirm(`Apakah Anda yakin ingin menyerahkan berkas kepada ${namaInput}?`)) {
            let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            if(tr[index]) {
                tr[index].statusBerkas = "DISERAHKAN";
                tr[index].namaPengambil = namaInput; 
                localStorage.setItem("dataTransaksi", JSON.stringify(tr));
                tampilkanPenyerahan();
            }
        }
    }

    // FUNGSI UNTUK JALUR CETAK (OTOMATIS SAVE INPUT JIKA ADA PERUBAHAN)
    function prosesCetak(index) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let namaInput = document.getElementById(`pengambil-${index}`).value.trim();
        
        if (tr[index]) {
            if (namaInput !== tr[index].namaPengambil) {
                tr[index].namaPengambil = namaInput;
                localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            }
            
            let namaCetak = namaInput || tr[index].pengurus; 
            let namaLayanan = tr[index].layanan || "-";
            
            cetakTandaTerima(tr[index].pengurus, tr[index].nopol, namaLayanan, namaCetak);
        }
    }

    // FUNGSI HAPUS TRANSAKSI
    function hapusTransaksi(index) {
        if(confirm('Apakah Anda yakin ingin menghapus data transaksi ini?')) {
            let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            tr.splice(index, 1);
            localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            tampilkanPenyerahan();
        }
    }

    // FUNGSI TEMPLATE NOTA CETAK DENGAN WATERMARK BACKGROUND LOGO
    function cetakTandaTerima(nama, nopol, layanan, namaPengambil) {
        let w = window.open('', '_blank');
        w.document.write(`
            <html>
            <head>
                <title>Tanda Terima Berkas</title>
                <style>
                    @media print {
                        body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    }
                    .nota-box { 
                        border: 2px dashed #333; 
                        padding: 25px; 
                        max-width: 500px; 
                        margin: auto; 
                        text-align: left; 
                        position: relative;
                        background: #fff;
                        overflow: hidden;
                    }
                    .bg-logo-watermark {
                        position: absolute;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%) rotate(-15deg);
                        width: 75%;
                        opacity: 0.08;
                        z-index: 0;
                        pointer-events: none;
                    }
                    .konten {
                        position: relative;
                        z-index: 1;
                    }
                    .nota-table { width:100%; font-size: 14px; text-align: center; border-collapse: collapse; margin-top: 10px; }
                    .nota-table td { border: none; padding: 5px; text-align: center; }
                </style>
            </head>
            <body style="font-family:Arial, sans-serif; text-align:center; padding: 20px;" onload="window.print()">
                
                <div class="nota-box">
                    <img src="logo-az.jpeg" class="bg-logo-watermark" alt="Logo Watermark">
                    
                    <div class="konten">
                        <h3 style="text-align:center; margin-bottom: 5px; font-size: 16px; line-height: 1.3;">
                            ASKARA ZAYYAN BIRO JASA KENDARAAN BERMOTOR
                        </h3>
                        <p style="text-align:center; font-size:12px; margin-bottom:20px; color:#555;">Bukti Penyerahan Dokumen Kendaraan</p>
                        <hr style="border: 1px dashed #333;">
                        
                        <div style="margin: 15px 0; font-size: 14px; line-height: 1.6;">
                            <p>Telah diserahkan kembali berkas asli kepada pelanggan dengan rincian berikut:</p>
                            <p style="margin-left: 10px;">Nama Pelanggan: <b>${nama}</b></p>
                            <p style="margin-left: 10px;">No. Polisi Kendaraan: <b>${nopol}</b></p>
                            <p style="margin-left: 10px;">Jenis Layanan: <b>${layanan}</b></p>
                            <p style="margin-left: 10px;">Tanggal Ambil: ${new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                        
                        <hr style="border: 1px dashed #333; margin-top:20px; margin-bottom:30px;">
                        
                        <table class="nota-table">
                            <tr>
                                <td style="width: 50%;">Yang Menyerahkan,</td>
                                <td style="width: 50%;">Yang Menerima,</td>
                            </tr>
                            <tr style="height:70px;">
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <td>( ASKARA ZAYYAN )</td>
                                <td>( <b>${namaPengambil}</b> )</td>
                            </tr>
                        </table>
                    </div>
                </div>
                
            </body>
            </html>
        `);
        w.document.close();
    }

    tampilkanPenyerahan();
</script>
</body>
</html>
