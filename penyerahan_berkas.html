<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyerahan Berkas</title>
    <style>
        body { font-family: Segoe UI, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0d47a1; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .btn-print { background: #1976d2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <a href="dashboard.html">⬅ Kembali ke Dashboard</a>
        <h2>Penyerahan Berkas Selesai</h2>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Nota</th>
                <th>Nama STNK</th>
                <th>Plat</th>
                <th>Layanan</th>
                <th class="no-print">Aksi</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataTransaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

    function render() {
        let html = "";
        dataTransaksi.forEach((t, index) => {
            // Hanya tampilkan yang sudah SELESAI
            if (t.statusBerkas === "SELESAI") {
                html += `<tr>
                    <td>${t.nota}</td>
                    <td>${t.stnk}</td>
                    <td>${t.plat}</td>
                    <td>${t.layanan}</td>
                    <td class="no-print">
                        <button class="btn-print" onclick="cetak('${t.nota}', '${t.stnk}', '${t.plat}', '${t.layanan}')">Cetak Bukti</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById("isiTabel").innerHTML = html || "<tr><td colspan='5'>Tidak ada berkas yang selesai.</td></tr>";
    }

    function cetak(nota, nama, plat, layanan) {
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Bukti Penyerahan</title></head>
            <body style="font-family:sans-serif; padding:40px;">
                <h2 style="text-align:center;">BIRO JASA STNK ASKARA ZAYYAN</h2>
                <hr>
                <p><strong>Nota:</strong> ${nota}</p>
                <p><strong>Nama STNK:</strong> ${nama}</p>
                <p><strong>Plat Nomor:</strong> ${plat}</p>
                <p><strong>Jenis Layanan:</strong> ${layanan}</p>
                <p><strong>Status:</strong> Berkas Telah Diserahkan & Selesai</p>
                <br><br>
                <p style="text-align:right;">Tanda Terima,<br><br><br>(..........................)</p>
            </body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    render();
</script>
</body>
</html>
