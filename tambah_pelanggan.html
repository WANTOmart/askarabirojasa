<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Pelanggan</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0d47a1; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Tambah Pelanggan</h2>
    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="text" id="hp" placeholder="Nomor HP">
    <input type="text" id="alamat" placeholder="Alamat">
    <button id="btnSimpan">Simpan Data</button>
</div>

<script>
    // Memastikan elemen ada sebelum menjalankan script
    document.getElementById("btnSimpan").addEventListener("click", function() {
        let nama = document.getElementById("nama").value;
        let hp = document.getElementById("hp").value;
        let alamat = document.getElementById("alamat").value;

        if (nama === "" || hp === "") {
            alert("Nama dan HP harus diisi!");
            return;
        }

        // Ambil data lama
        let data = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        
        // Tambah data baru
        data.push({ nama: nama, hp: hp, alamat: alamat });
        
        // Simpan kembali
        localStorage.setItem("dataPelanggan", JSON.stringify(data));
        
        alert("Data berhasil disimpan!");
        
        // Kosongkan form
        document.getElementById("nama").value = "";
        document.getElementById("hp").value = "";
        document.getElementById("alamat").value = "";
    });
</script>

</body>
</html>
