<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Pelanggan</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .form-container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #0d47a1; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Tambah Pelanggan Baru</h2>
        <form action="simpan.php" method="POST">
            <input type="text" name="nama" placeholder="Nama Lengkap" required>
            <input type="text" name="telepon" placeholder="Nomor HP" required>
            <textarea name="alamat" placeholder="Alamat Lengkap"></textarea>
            <button type="submit">Simpan Data</button>
        </form>
    </div>
</body>
</html>
