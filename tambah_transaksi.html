<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Transaksi - Askara Zayyan</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, select { padding: 10px; margin: 5px 0; width: 100%; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .btn-save { background: #2e7d32; }
        .btn-del { background: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Transaksi</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="pilihPelanggan" onchange="updateKendaraan()">
            <option value="">-- Pilih Pelanggan --</option>
        </select>
        <select id="pilihKendaraan">
            <option value="">-- Pilih Nopol Kendaraan --</option>
        </select>
        <input type="number" id="biaya" placeholder="Total Biaya (Rp)">
        <input type="number" id="dp" placeholder="Uang Muka/DP (Rp)">
        <input type="text" id="status" placeholder="Status (Contoh: Proses/Selesai)">
        <button class="btn btn-save" onclick="simpanTransaksi()">Simpan Transaksi</button>
    </div>

    <table>
        <thead>
            <tr><th>Pelanggan</th><th>Nopol</th><th>Biaya</th><th>DP</th><th>Sisa</th><th>Status</th><th>Aksi</th></tr>
        </thead>
        <tbody id="tabelTransaksi"></tbody>
    </table>
</div>

<script>
    let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
    let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
    let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

    // Isi dropdown pelanggan
    let selPelanggan = document.getElementById("pilihPelanggan");
    pelanggan.forEach(p => {
        selPelanggan.innerHTML += `<option value="${p.nama}">${p.nama}</option>`;
    });

    // Update dropdown kendaraan berdasarkan nama pelanggan
    function updateKendaraan() {
        let nama = document.getElementById("pilihPelanggan").value;
        let selKendaraan = document.getElementById("pilihKendaraan");
        selKendaraan.innerHTML = `<option value="">-- Pilih Nopol --</option>`;
        
        kendaraan.filter(k => k.namaPelanggan === nama).forEach(k => {
            selKendaraan.innerHTML += `<option value="${k.noPlat}">${k.noPlat}</option>`;
        });
    }

    function render() {
        let tbody = document.getElementById("tabelTransaksi");
        tbody.innerHTML = "";
        transaksi.forEach((t, index) => {
            let sisa = t.biaya - t.dp;
            tbody.innerHTML += `<tr>
                <td>${t.nama}</td><td>${t.nopol}</td><td>${t.biaya}</td><td>${t.dp}</td>
                <td>${sisa}</td><td>${t.status}</td>
                <td><button class="btn btn-del" onclick="hapus(${index})">Hapus</button></td>
            </tr>`;
        });
    }

    function simpanTransaksi() {
        let t = {
            nama: document.getElementById("pilihPelanggan").value,
            nopol: document.getElementById("pilihKendaraan").value,
            biaya: Number(document.getElementById("biaya").value),
            dp: Number(document.getElementById("dp").value),
            status: document.getElementById("status").value
        };
        transaksi.push(t);
        localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
        render();
    }

    function hapus(index) {
        if(confirm("Hapus data ini?")) {
            transaksi.splice(index, 1);
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            render();
        }
    }

    render();
</script>
</body>
</html>
