<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelunasan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.btn-save{
background:#2e7d32;
}

.btn-next{
background:#1565c0;
}

.btn-delete{
background:#c62828;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#2e7d32;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>
<body>

<div class="header">
<h2>PELUNASAN</h2>

<div>
<a href="tracking.html">⬅ Kembali</a>
</div>
</div>

<div class="container">

<div class="card">

<h3>Pembayaran Pelunasan</h3>

<label>Nomor Polisi</label>
<input type="text" id="nopol" readonly>

<label>Nama Pelanggan</label>
<input type="text" id="nama" readonly>

<label>Total Biaya</label>
<input type="number" id="total" readonly>

<label>DP</label>
<input type="number" id="dp" readonly>

<label>Sisa Tagihan</label>
<input type="number" id="sisa" readonly>

<label>Jumlah Pelunasan</label>
<input type="number" id="bayar">

<button class="btn-save" onclick="simpanPelunasan()">
Simpan Pelunasan
</button>

</div>

<table>

<thead>
<tr>
<th>No</th>
<th>No Polisi</th>
<th>Nama</th>
<th>Total</th>
<th>DP</th>
<th>Pelunasan</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataPelunasan"></tbody>

</table>

</div>

<script>

let transaksi =
JSON.parse(localStorage.getItem("dataTransaksi")) || [];

let pelunasan =
JSON.parse(localStorage.getItem("dataPelunasan")) || [];

let nopolCari =
localStorage.getItem("nopolPelunasan");

function loadData(){

let data =
transaksi.find(x=>x.nopol===nopolCari);

if(data){

document.getElementById("nopol").value =
data.nopol;

document.getElementById("nama").value =
data.nama;

document.getElementById("total").value =
data.biayaJasa;

document.getElementById("dp").value =
data.dp;

document.getElementById("sisa").value =
data.sisa;

}

}

function simpanPelunasan(){

let nopol =
document.getElementById("nopol").value;

let nama =
document.getElementById("nama").value;

let total =
Number(document.getElementById("total").value);

let dp =
Number(document.getElementById("dp").value);

let bayar =
Number(document.getElementById("bayar").value);

let sisa =
total - dp;

if(bayar < sisa){

alert("Pelunasan kurang dari sisa tagihan");
return;

}

let obj = {

nopol:nopol,
nama:nama,
total:total,
dp:dp,
pelunasan:bayar,
status:"LUNAS"

};

let cek =
pelunasan.findIndex(x=>x.nopol===nopol);

if(cek>=0){

pelunasan[cek]=obj;

}else{

pelunasan.push(obj);

}

localStorage.setItem(
"dataPelunasan",
JSON.stringify(pelunasan)
);

alert("Pelunasan berhasil disimpan");

tampilData();

}

function tampilData(){

let tbody =
document.getElementById("dataPelunasan");

tbody.innerHTML="";

pelunasan.forEach((p,i)=>{

tbody.innerHTML += `
<tr>

<td>${i+1}</td>
<td>${p.nopol}</td>
<td>${p.nama}</td>
<td>Rp ${Number(p.total).toLocaleString('id-ID')}</td>
<td>Rp ${Number(p.dp).toLocaleString('id-ID')}</td>
<td>Rp ${Number(p.pelunasan).toLocaleString('id-ID')}</td>
<td>${p.status}</td>

<td>

<button
class="btn-next"
onclick="lanjutBerkas('${p.nopol}')">
Penyerahan
</button>

<button
class="btn-delete"
onclick="hapus(${i})">
Hapus
</button>

</td>

</tr>
`;

});

}

function lanjutBerkas(nopol){

localStorage.setItem(
"nopolBerkas",
nopol
);

window.location =
"penyerahan_berkas.html";

}

function hapus(i){

if(confirm("Hapus data?")){

pelunasan.splice(i,1);

localStorage.setItem(
"dataPelunasan",
JSON.stringify(pelunasan)
);

tampilData();

}

}

loadData();
tampilData();

</script>

</body>
</html>
