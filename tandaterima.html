<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelunasan Transaksi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#0d47a1;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back{
    color:white;
    text-decoration:none;
    background:rgba(255,255,255,.2);
    padding:8px 12px;
    border-radius:6px;
}

.container{
    max-width:1200px;
    margin:20px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.search{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d47a1;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.lunas{
    color:green;
    font-weight:bold;
}

.belum{
    color:red;
    font-weight:bold;
}

.btn{
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-bayar{
    background:#2e7d32;
}

.btn-bayar:hover{
    background:#1b5e20;
}
</style>

</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back">⬅ Dashboard</a>
    <h2>PELUNASAN TRANSAKSI</h2>
</div>

<div class="container">

<div class="card">

<input
type="text"
id="cari"
class="search"
placeholder="Cari Nota atau Nama Pelanggan..."
onkeyup="renderData()">

<table>

<thead>
<tr>
<th>Nota</th>
<th>Pelanggan</th>
<th>No Polisi</th>
<th>Total Biaya</th>
<th>Sudah Dibayar</th>
<th>Sisa</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="isiTabel"></tbody>

</table>

</div>

</div>

<script>

function formatRupiah(nilai){
    return "Rp " +
    Number(nilai).toLocaleString("id-ID");
}

function renderData(){

    let data =
    JSON.parse(localStorage.getItem("dataTransaksi"))
    || [];

    let keyword =
    document.getElementById("cari")
    .value
    .toLowerCase();

    let tbody =
    document.getElementById("isiTabel");

    tbody.innerHTML="";

    data.forEach((t,index)=>{

        if(
            !t.nota.toLowerCase().includes(keyword)
            &&
            !t.pelanggan.toLowerCase().includes(keyword)
        ){
            return;
        }

        tbody.innerHTML += `
        <tr>

        <td>${t.nota}</td>

        <td>${t.pelanggan}</td>

        <td>${t.noPolisi}</td>

        <td>${formatRupiah(t.biayaJasa)}</td>

        <td>${formatRupiah(t.dp)}</td>

        <td>${formatRupiah(t.sisa)}</td>

        <td class="${
            t.pembayaran==="Lunas"
            ? "lunas"
            : "belum"
        }">
            ${t.pembayaran}
        </td>

        <td>

        ${
            t.pembayaran==="Lunas"
            ?
            "✓ Selesai"
            :
            `<button
            class="btn btn-bayar"
            onclick="pelunasan(${index})">
            Pelunasan
            </button>`
        }

        </td>

        </tr>
        `;
    });
}

function pelunasan(index){

    let data =
    JSON.parse(localStorage.getItem("dataTransaksi"));

    let nominal =
    prompt("Masukkan nominal pelunasan");

    if(
        nominal===null ||
        nominal===""
    ){
        return;
    }

    nominal = Number(nominal);

    data[index].dp =
    Number(data[index].dp)
    + nominal;

    data[index].sisa =
    Number(data[index].biayaJasa)
    - Number(data[index].dp);

    if(data[index].sisa <= 0){

        data[index].sisa = 0;
        data[index].pembayaran = "Lunas";

        alert(
        "Pembayaran LUNAS.\nBerkas siap diserahkan."
        );

    }

    localStorage.setItem(
        "dataTransaksi",
        JSON.stringify(data)
    );

    renderData();
}

renderData();

</script>

</body>
</html>
