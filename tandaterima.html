<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyerahan Berkas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#6a1b9a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.btn-save{
background:#2e7d32;
}

.btn-delete{
background:#c62828;
}

.btn-finish{
background:#1565c0;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#6a1b9a;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>
<body>

<div class="header">
<h2>PENYERAHAN BERKAS</h2>

<div>
<a href="pelunasan.html">⬅ Kembali</a>
</div>
</div>

<div class="container">

<div class="card">

<h3>Data Penyerahan Berkas</h3>

<label>No Polisi</label>
<input type="text" id="nopol" readonly>

<label>Nama Pelanggan</label>
<input type="text" id="nama" readonly>

<label>Tanggal Penyerahan</label>
<input type="date" id="tanggal">

<button class="btn-save" onclick="simpanBerkas()">
Simpan Penyerahan
</button>

</div>

<table>

<thead>
<tr>
<th>No</th>
<th>No Polisi</th>
<th>Nama</th>
<th>Tanggal</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataBerkas"></tbody>

</table>

</div>

<script>

let pelunasan =
JSON.parse(localStorage.getItem("dataPelunasan")) || [];

let berkas =
JSON.parse(localStorage.getItem("dataBerkas")) || [];

let nopolCari =
localStorage.getItem("nopolBerkas");

function loadData(){

let data =
pelunasan.find(x=>x.nopol===nopolCari);

if(data){

document.getElementById("nopol").value =
data.nopol;

document.getElementById("nama").value =
data.nama;

}

}

function simpanBerkas(){

let nopol =
document.getElementById("nopol").value;

let nama =
document.getElementById("nama").value;

let tanggal =
document.getElementById("tanggal").value;

if(tanggal==""){

alert("Tanggal wajib diisi");
return;

}

let obj = {

nopol:nopol,
nama:nama,
tanggal:tanggal,
status:"SELESAI"

};

let cek =
berkas.findIndex(x=>x.nopol===nopol);

if(cek>=0){

berkas[cek]=obj;

}else{

berkas.push(obj);

}

localStorage.setItem(
"dataBerkas",
JSON.stringify(berkas)
);

updateDashboard();

alert("Penyerahan berkas berhasil disimpan");

tampilData();

}

function updateDashboard(){

let transaksi =
JSON.parse(localStorage.getItem("dataTransaksi")) || [];

transaksi.forEach(t=>{

if(t.nopol===document.getElementById("nopol").value){

t.statusBerkas="SELESAI";

}

});

localStorage.setItem(
"dataTransaksi",
JSON.stringify(transaksi)
);

}

function tampilData(){

let tbody =
document.getElementById("dataBerkas");

tbody.innerHTML="";

berkas.forEach((b,i)=>{

tbody.innerHTML += `
<tr>

<td>${i+1}</td>
<td>${b.nopol}</td>
<td>${b.nama}</td>
<td>${b.tanggal}</td>
<td>${b.status}</td>

<td>

<button
class="btn-finish"
onclick="cetak('${b.nopol}')">
Selesai
</button>

<button
class="btn-delete"
onclick="hapus(${i})">
Hapus
</button>

</td>

</tr>
`;

});

}

function cetak(nopol){

alert(
"Berkas " + nopol + " telah selesai dan diserahkan kepada pelanggan."
);

window.location="dashboard.html";

}

function hapus(i){

if(confirm("Hapus data?")){

berkas.splice(i,1);

localStorage.setItem(
"dataBerkas",
JSON.stringify(berkas)
);

tampilData();

}

}

loadData();
tampilData();

</script>

</body>
</html>
