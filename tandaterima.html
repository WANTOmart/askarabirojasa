<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyerahan Berkas</title>

<style>

*{
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.back{
    background:#546e7a;
    text-decoration:none;
}

.serah{
    background:#2e7d32;
}

.cetak{
    background:#1565c0;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d47a1;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

input{
    padding:8px;
    width:180px;
}

.selesai{
    color:green;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<div class="header">

<a href="dashboard.html" class="btn back">
⬅ Dashboard
</a>

<h2>Penyerahan Berkas</h2>

</div>

<table>

<thead>
<tr>
<th>Nota</th>
<th>Pelanggan</th>
<th>No Polisi</th>
<th>Layanan</th>
<th>Status Bayar</th>
<th>Penerima</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="isiTabel"></tbody>

</table>

</div>

<script>

function render(){

let data =
JSON.parse(localStorage.getItem("dataTransaksi"))
|| [];

let tbody =
document.getElementById("isiTabel");

tbody.innerHTML="";

data.forEach((t,index)=>{

if(t.pembayaran==="Lunas"){

tbody.innerHTML += `

<tr>

<td>${t.nota}</td>

<td>${t.pelanggan}</td>

<td>${t.noPolisi}</td>

<td>${t.layanan}</td>

<td>${t.pembayaran}</td>

<td>

<input
type="text"
id="penerima${index}"
placeholder="Nama Penerima">

</td>

<td>

<button
class="btn serah"
onclick="serahkan(${index})">

Serahkan

</button>

<button
class="btn cetak"
onclick="cetak(${index})">

Cetak

</button>

</td>

</tr>

`;

}

});

}

function serahkan(index){

let data =
JSON.parse(localStorage.getItem("dataTransaksi"));

let penerima =
document.getElementById(
"penerima"+index
).value;

if(penerima===""){

alert("Masukkan nama penerima");

return;

}

data[index].statusBerkas =
"SELESAI";

data[index].penerima =
penerima;

data[index].tanggalSerah =
new Date().toLocaleDateString("id-ID");

localStorage.setItem(
"dataTransaksi",
JSON.stringify(data)
);

alert("Berkas berhasil diserahkan");

render();

}

function cetak(index){

let data =
JSON.parse(localStorage.getItem("dataTransaksi"));

let t = data[index];

let w =
window.open("","","width=800,height=700");

w.document.write(`

<html>

<head>

<title>Bukti Penyerahan Berkas</title>

<style>

body{
font-family:Arial;
padding:30px;
}

h2{
text-align:center;
}

table{
width:100%;
}

td{
padding:8px;
}

</style>

</head>

<body>

<h2>
BUKTI PENYERAHAN BERKAS
</h2>

<hr>

<table>

<tr>
<td>No Nota</td>
<td>: ${t.nota}</td>
</tr>

<tr>
<td>Nama Pelanggan</td>
<td>: ${t.pelanggan}</td>
</tr>

<tr>
<td>No Polisi</td>
<td>: ${t.noPolisi}</td>
</tr>

<tr>
<td>Layanan</td>
<td>: ${t.layanan}</td>
</tr>

<tr>
<td>Status Pembayaran</td>
<td>: ${t.pembayaran}</td>
</tr>

<tr>
<td>Penerima</td>
<td>: ${t.penerima || "-"}</td>
</tr>

<tr>
<td>Tanggal Serah</td>
<td>: ${t.tanggalSerah || "-"}</td>
</tr>

</table>

<br><br><br>

<table width="100%">

<tr>

<td align="center">

Petugas

<br><br><br><br>

(_______________)

</td>

<td align="center">

Penerima

<br><br><br><br>

(${t.penerima || "_______________"})

</td>

</tr>

</table>

</body>

</html>

`);

w.print();

}

render();

</script>

</body>
</html>
