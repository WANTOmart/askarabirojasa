<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Berkas - Askara Zayyan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; }
        .header { background-color: #0d47a1; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header .btn-back { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 6px; }
        .header h1 { font-size: 18px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .search-box button { background: #0d47a1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .timeline { border-left: 3px solid #0d47a1; padding-left: 20px; margin-left: 10px; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item::before { content: ''; position: absolute; left: -27px; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: #0d47a1; border: 2px solid white; }
        .timeline-item.active::before { background: #2e7d32; }
        .timeline-item h4 { font-size: 15px; color: #333; }
        .timeline-item p { font-size: 12px; color: #777; margin-top: 2px; }
    </style>
</head>
<body>
<div class="header">
    <a href="dashboard.html" class="btn-back">⬅ Kembali</a>
    <h1>Tracking Proses Berkas</h1>
    <span>🔍</span>
</div>
<div class="container">
    <div class="card">
        <div class="search-box">
            <input type="text" value="TRX-002" placeholder="Masukkan Nomor Nota...">
            <button>Cari</button>
        </div>
        <div class="timeline">
            <div class="timeline-item active">
                <h4>Berkas Sedang Diproses di Samsat</h4>
                <p>08 Juni 2026 - 10:30 WIB</p>
            </div>
            <div class="timeline-item">
                <h4>Cek Fisik Kendaraan Selesai</h4>
                <p>07 Juni 2026 - 14:15 WIB</p>
            </div>
            <div class="timeline-item">
                <h4>Berkas Diterima oleh Askara Zayyan</h4>
                <p>07 Juni 2026 - 09:00 WIB</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
