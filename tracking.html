<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Berkas</title>
    <style>
        * { box-sizing: border-box; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { color: #0d47a1; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-done { background: #2e7d32; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .status-proses { color: #f57c00; font-weight: bold; }
        .status-selesai { color: #2e7d32; font-weight: bold; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
    <h2>Tracking Status Berkas</h2>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Kendaraan</th>
                <th>Layanan</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelTracking"></tbody>
    </table>
</div>

<script>
    function tampilkanTracking() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        
        transaksi.forEach((t, index) => {
            let statusClass = t.statusBerkas === "SELESAI" ? "status-selesai" : "status-proses";
            html += `<tr>
                <td>${t.pelanggan}</td>
                <td>${t.kendaraan}</td>
                <td>${t.layanan}</td>
                <td class="${statusClass}">${t.statusBerkas}</td>
                <td>
                    ${t.statusBerkas === "PROSES" ? 
                      `<button class="btn-done" onclick="selesaikan(${index})">Selesai</button>` : 
                      "✓"}
                </td>
            </tr>`;
        });
        document.getElementById("tabelTracking").innerHTML = html;
    }

    function selesaikan(index) {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        transaksi[index].statusBerkas = "SELESAI";
        localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
        tampilkanTracking();
    }

    tampilkanTracking();
</script>

</body>
</html>
