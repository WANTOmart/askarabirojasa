<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Berkas</title>

<style>

body{
    font-family:Segoe UI,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-bottom:20px;
}

select,input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    background:#0d47a1;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

.info{
    background:#f5f5f5;
    padding:15px;
    border-radius:5px;
    margin-top:10px;
}

.timeline{
    margin-top:20px;
}

.item{
    border-left:4px solid #0d47a1;
    padding:10px 15px;
    margin-bottom:10px;
    background:#fafafa;
}

.item h4{
    margin:0;
    color:#0d47a1;
}

.item small{
    color:#666;
}

</style>
</head>
<body>

<div class="container">

<h2>TRACKING BERKAS</h2>

<select id="notaSelect">
<option value="">Pilih Nomor Nota</option>
</select>

<div class="info">

<p>
<b>Nama :</b>
<span id="nama">-</span>
</p>

<p>
<b>Plat :</b>
<span id="plat">-</span>
</p>

<p>
<b>Layanan :</b>
<span id="layanan">-</span>
</p>

</div>

<br>

<select id="status">

<option>Berkas Diterima</option>

<option>Cek Fisik Kendaraan</option>

<option>Proses Samsat</option>

<option>Pencetakan STNK</option>

<option>STNK Selesai</option>

<option>Siap Diambil</option>

<option>Selesai / Diserahkan</option>

</select>

<button onclick="simpanTracking()">
Update Tracking
</button>

<div class="timeline" id="timeline">

</div>

</div>

<script>

let transaksi =
JSON.parse(
localStorage.getItem("dataTransaksi")
) || [];

let tracking =
JSON.parse(
localStorage.getItem("dataTracking")
) || [];

function loadNota(){

let select =
document.getElementById(
"notaSelect"
);

transaksi.forEach((t,index)=>{

select.innerHTML += `
<option value="${t.nota}">
${t.nota}
</option>
`;

});

}

document
.getElementById("notaSelect")
.addEventListener("change",function(){

let nota = this.value;

let trx =
transaksi.find(
x=>x.nota===nota
);

if(!trx) return;

document.getElementById("nama")
.innerText = trx.nama;

document.getElementById("plat")
.innerText = trx.plat;

document.getElementById("layanan")
.innerText = trx.layanan;

renderTimeline(nota);

});

function simpanTracking(){

let nota =
document.getElementById(
"notaSelect"
).value;

if(nota===""){

alert("Pilih nota dahulu");

return;

}

tracking.push({

nota:nota,

status:
document.getElementById(
"status"
).value,

tanggal:
new Date()
.toLocaleString("id-ID")

});

localStorage.setItem(
"dataTracking",
JSON.stringify(tracking)
);

renderTimeline(nota);

alert("Tracking berhasil diupdate");

}

function renderTimeline(nota){

let area =
document.getElementById(
"timeline"
);

area.innerHTML="";

let data =
tracking.filter(
x=>x.nota===nota
);

data.forEach(item=>{

area.innerHTML += `

<div class="item">

<h4>
${item.status}
</h4>

<small>
${item.tanggal}
</small>

</div>

`;

});

}

loadNota();

</script>

</body>
</html>
