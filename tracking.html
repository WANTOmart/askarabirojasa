<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Status Berkas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { margin-bottom: 20px; color: #0d47a1; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; display: inline-block; text-decoration: none; border-radius: 5px; margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .PROSES { background: #fff3e0; color: #e65100; }
        .SELESAI { background: #e8f5e9; color: #1b5e20; }
        .DISERAHKAN { background: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali</a>
    <h2>Tracking Berkas Kendaraan</h2>
    
    <input type="text" id="search" placeholder="Cari berdasarkan Nopol atau Nama Pelanggan..." onkeyup="filterTabel()">

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Nopol</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelTracking"></tbody>
    </table>
</div>

<script>
    function tampilkanTracking() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        
        transaksi.forEach((t, index) => {
            html += `<tr>
                <td>${t.pengurus}</td>
                <td>${t.nopol}</td>
                <td><span class="status-badge ${t.statusBerkas}">${t.statusBerkas}</span></td>
                <td>
                    <select onchange="updateStatus(${index}, this.value)">
                        <option value="PROSES" ${t.statusBerkas === 'PROSES' ? 'selected' : ''}>PROSES</option>
                        <option value="SELESAI" ${t.statusBerkas === 'SELESAI' ? 'selected' : ''}>SELESAI</option>
                        <option value="DISERAHKAN" ${t.statusBerkas === 'DISERAHKAN' ? 'selected' : ''}>DISERAHKAN</option>
                    </select>
                </td>
            </tr>`;
        });
        document.getElementById("tabelTracking").innerHTML = html;
    }

    function updateStatus(index, statusBaru) {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi"));
        transaksi[index].statusBerkas = statusBaru;
        localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
        tampilkanTracking();
    }

    function filterTabel() {
        let input = document.getElementById("search").value.toLowerCase();
        let rows = document.getElementById("tabelTracking").getElementsByTagName("tr");
        
        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText.toLowerCase();
            rows[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    tampilkanTracking();
</script>

</body>
</html>
