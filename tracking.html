<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Berkas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#fb8c00;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.btn-save{
background:#2e7d32;
}

.btn-next{
background:#1565c0;
}

.btn-edit{
background:#ff9800;
}

.btn-delete{
background:#c62828;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

table th{
background:#fb8c00;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>
<body>

<div class="header">
<h2>TRACKING BERKAS</h2>

<div>
<a href="transaksi.html">⬅ Kembali</a>
</div>
</div>

<div class="container">

<div class="card">

<h3>Update Status Berkas</h3>

<label>Nomor Polisi</label>
<select id="nopol"></select>

<label>Status Berkas</label>
<select id="status">
<option>Proses Cek Fisik</option>
<option>Proses Samsat</option>
<option>Proses BPKB</option>
<option>Proses STNK</option>
<option>SELESAI</option>
</select>

<button class="btn-save" onclick="simpanTracking()">
Simpan Tracking
</button>

</div>

<table>

<thead>
<tr>
<th>No</th>
<th>No Polisi</th>
<th>Nama</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataTracking"></tbody>

</table>

</div>

<script>

let transaksi =
JSON.parse(localStorage.getItem("dataTransaksi")) || [];

let tracking =
JSON.parse(localStorage.getItem("dataTracking")) || [];

function loadNopol(){

let select =
document.getElementById("nopol");

select.innerHTML="";

transaksi.forEach((t,index)=>{

select.innerHTML += `
<option value="${index}">
${t.nopol} - ${t.nama}
</option>
`;

});

}

function simpanTracking(){

let index =
document.getElementById("nopol").value;

let status =
document.getElementById("status").value;

let data = transaksi[index];

let obj = {
nama:data.nama,
nopol:data.nopol,
status:status
};

let cek =
tracking.findIndex(x=>x.nopol===data.nopol);

if(cek>=0){

tracking[cek]=obj;

}else{

tracking.push(obj);

}

localStorage.setItem(
"dataTracking",
JSON.stringify(tracking)
);

tampilTracking();

alert("Tracking berhasil disimpan");

}

function tampilTracking(){

let tbody =
document.getElementById("dataTracking");

tbody.innerHTML="";

tracking.forEach((t,i)=>{

tbody.innerHTML += `
<tr>

<td>${i+1}</td>
<td>${t.nopol}</td>
<td>${t.nama}</td>
<td>${t.status}</td>

<td>

<button
class="btn-next"
onclick="lanjutPelunasan('${t.nopol}')">
Pelunasan
</button>

<button
class="btn-delete"
onclick="hapus(${i})">
Hapus
</button>

</td>

</tr>
`;

});

}

function lanjutPelunasan(nopol){

localStorage.setItem(
"nopolPelunasan",
nopol
);

window.location = "pages/pelunasan.html";
}

function hapus(i){

if(confirm("Hapus data?")){

tracking.splice(i,1);

localStorage.setItem(
"dataTracking",
JSON.stringify(tracking)
);

tampilTracking();

}

}

loadNopol();
tampilTracking();

</script>

</body>
</html>
