<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Berkas</title>
    <style>
        body { font-family: Segoe UI, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0d47a1; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        select { padding: 5px; border-radius: 4px; }
        .status-btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html">⬅ Kembali ke Dashboard</a>
    <h2>Tracking Status Berkas</h2>
    
    <table>
        <thead>
            <tr>
                <th>Nota</th>
                <th>Nama STNK</th>
                <th>Plat</th>
                <th>Status Berkas</th>
                <th>Update</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataTransaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

    function render() {
        let html = "";
        dataTransaksi.forEach((t, index) => {
            html += `<tr>
                <td>${t.nota}</td>
                <td>${t.stnk}</td>
                <td>${t.plat}</td>
                <td>
                    <select onchange="updateStatus(${index}, this.value)">
                        <option value="BERKAS DITERIMA" ${t.statusBerkas === 'BERKAS DITERIMA' ? 'selected' : ''}>Diterima</option>
                        <option value="DIPROSES" ${t.statusBerkas === 'DIPROSES' ? 'selected' : ''}>Diproses</option>
                        <option value="SELESAI" ${t.statusBerkas === 'SELESAI' ? 'selected' : ''}>Selesai</option>
                        <option value="DIAMBIL" ${t.statusBerkas === 'DIAMBIL' ? 'selected' : ''}>Diambil</option>
                    </select>
                </td>
                <td>${t.statusBerkas}</td>
            </tr>`;
        });
        document.getElementById("isiTabel").innerHTML = html;
    }

    function updateStatus(index, status) {
        dataTransaksi[index].statusBerkas = status;
        localStorage.setItem("dataTransaksi", JSON.stringify(dataTransaksi));
        render(); // Refresh tabel
    }

    render();
</script>
</body>
</html>
