<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Transaksi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; }
        .header { background-color: #0d47a1; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .table-responsive { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #0d47a1; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-hapus { background: #c62828; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <a href="dashboard.html" style="color:white; text-decoration:none;">⬅ Kembali</a>
    <h1>Data Transaksi</h1>
    <a href="tambah_transaksi.html" style="color:white; font-size: 24px; text-decoration:none;">➕</a>
</div>
<div class="container">
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>No. Nota</th><th>Pelanggan</th><th>Layanan</th><th>Biaya</th><th>Status</th><th>Aksi</th>
                </tr>
            </thead>
            <tbody id="isiTabel"></tbody>
        </table>
    </div>
</div>

<script>
    function renderTabel() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let tbody = document.getElementById("isiTabel");
        tbody.innerHTML = "";
        transaksi.forEach((t, index) => {
            tbody.innerHTML += `<tr>
                <td>${t.nota}</td><td>${t.pelanggan}</td><td>${t.layanan}</td>
                <td>Rp ${parseInt(t.biaya).toLocaleString()}</td><td>${t.status}</td>
                <td><button class="btn-hapus" onclick="hapus(${index})">Hapus</button></td>
            </tr>`;
        });
    }
    function hapus(index) {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi"));
        transaksi.splice(index, 1);
        localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
        renderTabel();
    }
    renderTabel();
</script>
</body>
</html>
