<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - Biro Jasa STNK</title>
    <style>
        * { box-sizing: border-box; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { color: #0d47a1; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: #2e7d32; color: white; width: 100%; margin-top: 15px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
        .btn-print { background: #0277bd; color: white; padding: 5px 8px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali ke Dashboard</a>
    <h2>Input Transaksi</h2>
    
    <div class="form-grid">
        <select id="pilihPelanggan" onchange="filterKendaraan()">
            <option value="">-- Pilih Pelanggan --</option>
        </select>
        <select id="pilihKendaraan">
            <option value="">-- Pilih Kendaraan --</option>
        </select>
        <select id="jenisLayanan">
            <option value="">-- Pilih Jenis Layanan --</option>
            <option value="Pajak Tahunan">Pajak Tahunan</option>
            <option value="Balik Nama">Balik Nama</option>
            <option value="Cabut Berkas">Cabut Berkas</option>
            <option value="Pajak 5 Tahunan">Pajak 5 Tahunan</option>
        </select>
        <input type="number" id="biayaModal" placeholder="Biaya Resmi/Modal (Rp)">
        <input type="number" id="biayaJasa" placeholder="Biaya Jasa Anda (Rp)">
        <input type="number" id="dp" placeholder="Uang Muka / DP (Rp)">
    </div>
    <button onclick="simpanTransaksi()">Simpan Transaksi</button>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Kendaraan</th>
                <th>Layanan</th>
                <th>Modal</th>
                <th>Jasa</th>
                <th>Total</th>
                <th>DP</th>
                <th>Sisa</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelTransaksi"></tbody>
    </table>
</div>

<script>
    function loadData() {
        let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
        let selectP = document.getElementById("pilihPelanggan");
        pelanggan.forEach(p => {
            let opt = document.createElement("option");
            opt.value = p.nama;
            opt.innerHTML = p.nama;
            selectP.appendChild(opt);
        });
    }

    function filterKendaraan() {
        let nama = document.getElementById("pilihPelanggan").value;
        let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
        let selectK = document.getElementById("pilihKendaraan");
        selectK.innerHTML = '<option value="">-- Pilih Kendaraan --</option>';
        kendaraan.filter(k => k.pengurus === nama).forEach(k => {
            let opt = document.createElement("option");
            opt.value = k.nopol;
            opt.innerHTML = k.nopol + " - " + k.merk;
            selectK.appendChild(opt);
        });
    }

    function simpanTransaksi() {
        let pelanggan = document.getElementById("pilihPelanggan").value;
        let kendaraan = document.getElementById("pilihKendaraan").value;
        let layanan = document.getElementById("jenisLayanan").value;
        let modal = Number(document.getElementById("biayaModal").value);
        let jasa = Number(document.getElementById("biayaJasa").value);
        let total = modal + jasa;
        let dp = Number(document.getElementById("dp").value);
        let sisa = total - dp;
        let statusBerkas = "PROSES";

        if(pelanggan && kendaraan && layanan && modal && jasa) {
            let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            transaksi.push({pelanggan, kendaraan, layanan, modal, jasa, total, dp, sisa, statusBerkas});
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            location.reload();
        } else {
            alert("Mohon lengkapi semua data!");
        }
    }

    function cetakStruk(index) {
        let t = JSON.parse(localStorage.getItem("dataTransaksi"))[index];
        let win = window.open('', '', 'width=400,height=500');
        win.document.write(`<html><body style="font-family:monospace; padding:20px;" onload="window.print(); window.close();">
            <div style="text-align:center;"><h3>BIRO JASA STNK<br>ASKARA ZAYYAN</h3></div>
            <p>Pelanggan: ${t.pelanggan}<br>Layanan: ${t.layanan}</p><hr>
            <p>Modal: Rp ${t.modal.toLocaleString()}<br>Jasa: Rp ${t.jasa.toLocaleString()}<br>
            Total: Rp ${t.total.toLocaleString()}<br>DP: Rp ${t.dp.toLocaleString()}<br>
            Sisa: Rp ${t.sisa.toLocaleString()}</p>
        </body></html>`);
    }

    function tampilkan() {
        let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        transaksi.forEach((t, i) => {
            html += `<tr>
                <td>${t.pelanggan}</td>
                <td>${t.kendaraan}</td>
                <td>${t.layanan}</td>
                <td>${t.modal.toLocaleString()}</td>
                <td>${t.jasa.toLocaleString()}</td>
                <td>${t.total.toLocaleString()}</td>
                <td>${t.dp.toLocaleString()}</td>
                <td>${t.sisa.toLocaleString()}</td>
                <td><button class="btn-print" onclick="cetakStruk(${i})">Cetak</button></td>
            </tr>`;
        });
        document.getElementById("tabelTransaksi").innerHTML = html;
    }

    loadData();
    tampilkan();
</script>
</body>
</html>
