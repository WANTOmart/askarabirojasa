<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Transaksi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0d47a1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Tambah Transaksi Baru</h2>
    <input type="text" id="nota" placeholder="No. Nota (Contoh: #TRX-004)">
    <input type="text" id="pelanggan" placeholder="Nama Pelanggan">
    <input type="text" id="layanan" placeholder="Layanan">
    <input type="number" id="biaya" placeholder="Total Biaya (Angka saja)">
    <select id="status">
        <option value="Selesai">Selesai</option>
        <option value="Diproses">Diproses</option>
        <option value="Menunggu Loket">Menunggu Loket</option>
    </select>
    <button onclick="simpanTransaksi()">Simpan Transaksi</button>
</div>

<script>
    function simpanTransaksi() {
        let t = {
            nota: document.getElementById("nota").value,
            pelanggan: document.getElementById("pelanggan").value,
            layanan: document.getElementById("layanan").value,
            biaya: document.getElementById("biaya").value,
            status: document.getElementById("status").value
        };

        if(!t.nota || !t.pelanggan) { alert("Isi Nota dan Pelanggan!"); return; }

        let data = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        data.push(t);
        localStorage.setItem("dataTransaksi", JSON.stringify(data));
        
        alert("Data berhasil disimpan!");
        window.location.href = "transaksi.html"; // Kembali ke halaman tabel
    }
</script>

</body>
</html>
