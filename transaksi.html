<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Transaksi</title>

<style>

body{
    font-family:Segoe UI,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

input,select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    background:#0d47a1;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0d47a1;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.lunas{
    color:green;
    font-weight:bold;
}

.belum{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>TRANSAKSI</h2>

<div class="form-grid">

<input type="text" id="nota" readonly>

<input type="date" id="tanggal" readonly>

<select id="kendaraanSelect">
<option value="">Pilih Kendaraan</option>
</select>

<input type="text" id="nama" placeholder="Nama Pelanggan" readonly>

<input type="text" id="hp" placeholder="Nomor HP" readonly>

<input type="text" id="plat" placeholder="Plat Nomor" readonly>

<input type="text" id="merk" placeholder="Merk / Type" readonly>

<select id="layanan">

<option>Perpanjang STNK Tahunan</option>

<option>Perpanjang STNK 5 Tahunan</option>

<option>Balik Nama</option>

<option>Mutasi Keluar</option>

<option>Cabut Berkas</option>

</select>

<input
type="number"
id="biaya"
placeholder="Biaya Jasa">

<input
type="number"
id="dp"
placeholder="DP">

</div>

<br>

<button onclick="simpanTransaksi()">
Simpan Transaksi
</button>

<table>

<thead>

<tr>
<th>Nota</th>
<th>Pelanggan</th>
<th>Plat</th>
<th>Layanan</th>
<th>Biaya</th>
<th>DP</th>
<th>Sisa</th>
<th>Status</th>
</tr>

</thead>

<tbody id="isiTabel"></tbody>

</table>

</div>

<script>

let dataKendaraan =
JSON.parse(
localStorage.getItem("dataKendaraan")
) || [];

let dataTransaksi =
JSON.parse(
localStorage.getItem("dataTransaksi")
) || [];

function buatNota(){

return "TRX-" +
new Date().getFullYear() +
"-" +
String(dataTransaksi.length+1)
.padStart(4,"0");

}

document.getElementById("nota").value =
buatNota();

document.getElementById("tanggal").value =
new Date()
.toISOString()
.split("T")[0];

function loadKendaraan(){

let select =
document.getElementById(
"kendaraanSelect"
);

dataKendaraan.forEach((k,index)=>{

select.innerHTML += `
<option value="${index}">
${k.plat} - ${k.namaStnk}
</option>
`;

});

}

document
.getElementById("kendaraanSelect")
.addEventListener("change",function(){

let k =
dataKendaraan[this.value];

document.getElementById("nama").value =
k.namaPelanggan;

document.getElementById("hp").value =
k.hp;

document.getElementById("plat").value =
k.plat;

document.getElementById("merk").value =
k.merk;

});

function simpanTransaksi(){

let biaya =
Number(
document.getElementById("biaya")
.value
);

let dp =
Number(
document.getElementById("dp")
.value
);

let sisa = biaya - dp;

let transaksi = {

nota:
document.getElementById("nota")
.value,

tanggal:
document.getElementById("tanggal")
.value,

nama:
document.getElementById("nama")
.value,

hp:
document.getElementById("hp")
.value,

plat:
document.getElementById("plat")
.value,

merk:
document.getElementById("merk")
.value,

layanan:
document.getElementById("layanan")
.value,

biaya,

dp,

sisa,

status:
sisa <= 0
? "Lunas"
: "Belum Lunas"

};

dataTransaksi.push(transaksi);

localStorage.setItem(
"dataTransaksi",
JSON.stringify(dataTransaksi)
);

alert(
"Transaksi berhasil disimpan"
);

location.reload();

}

function renderTabel(){

let tbody =
document.getElementById(
"isiTabel"
);

tbody.innerHTML = "";

dataTransaksi.forEach(t=>{

tbody.innerHTML += `
<tr>

<td>${t.nota}</td>

<td>${t.nama}</td>

<td>${t.plat}</td>

<td>${t.layanan}</td>

<td>
Rp ${t.biaya.toLocaleString('id-ID')}
</td>

<td>
Rp ${t.dp.toLocaleString('id-ID')}
</td>

<td>
Rp ${t.sisa.toLocaleString('id-ID')}
</td>

<td class="${
t.status==="Lunas"
? "lunas"
: "belum"
}">
${t.status}
</td>

</tr>
`;

});

}

loadKendaraan();
renderTabel();

</script>

</body>
</html>
