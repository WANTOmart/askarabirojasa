<script>

function loadData(){

    let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];

    let selectP = document.getElementById("pilihPelanggan");

    selectP.innerHTML = '<option value="">-- Pilih Pelanggan --</option>';

    pelanggan.forEach(p=>{

        let opt = document.createElement("option");

        opt.value = p.nama;

        opt.textContent = p.nama;

        selectP.appendChild(opt);

    });

}



function filterKendaraan(){

    let nama = document.getElementById("pilihPelanggan").value;

    let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

    let selectK = document.getElementById("pilihKendaraan");


    selectK.innerHTML =
    '<option value="">-- Pilih Kendaraan --</option>';


    kendaraan.forEach(k=>{


        let pemilik = k.pengurus || k.pemilik || k.nama;


        if(pemilik == nama){


            let opt = document.createElement("option");


            opt.value = k.nopol;


            opt.textContent = k.nopol+" - "+k.merk;


            selectK.appendChild(opt);


        }


    });


}




function simpanTransaksi(){


    let pelanggan =
    document.getElementById("pilihPelanggan").value;


    let kendaraan =
    document.getElementById("pilihKendaraan").value;


    let layanan =
    document.getElementById("jenisLayanan").value;


    let modal =
    Number(document.getElementById("biayaModal").value) || 0;


    let jasa =
    Number(document.getElementById("biayaJasa").value) || 0;


    let dp =
    Number(document.getElementById("dp").value) || 0;



    // JIKA KENDARAAN KOSONG TETAP SIMPAN
    if(pelanggan==""){

        alert("Pilih pelanggan dulu");

        return;

    }


    if(layanan==""){

        alert("Pilih layanan dulu");

        return;

    }



    let total = modal+jasa;

    let sisa = total-dp;



    let transaksi =
    JSON.parse(localStorage.getItem("dataTransaksi")) || [];



    transaksi.push({

        pelanggan:pelanggan,

        kendaraan:kendaraan,

        layanan:layanan,

        modal:modal,

        jasa:jasa,

        total:total,

        dp:dp,

        sisa:sisa,

        status:"PROSES"

    });



    localStorage.setItem(
        "dataTransaksi",
        JSON.stringify(transaksi)
    );



    alert("Transaksi tersimpan");


    tampilkan();



}





function tampilkan(){


    let transaksi =
    JSON.parse(localStorage.getItem("dataTransaksi")) || [];


    let html="";


    transaksi.forEach((t,i)=>{


        html += `

        <tr>

        <td>${t.pelanggan}</td>

        <td>${t.kendaraan}</td>

        <td>${t.layanan}</td>

        <td>${t.modal.toLocaleString()}</td>

        <td>${t.jasa.toLocaleString()}</td>

        <td>${t.total.toLocaleString()}</td>

        <td>${t.dp.toLocaleString()}</td>

        <td>${t.sisa.toLocaleString()}</td>


        <td>

        <button class="btn-print"
        onclick="cetak(${i})">

        Cetak

        </button>


        </td>


        </tr>

        `;


    });



    document.getElementById("tabelTransaksi").innerHTML = html;



}







function cetak(i){


let t =
JSON.parse(localStorage.getItem("dataTransaksi"))[i];


let win =
window.open("","","width=400,height=500");


win.document.write(`


<h3 align="center">
BIRO JASA STNK<br>
ASKARA ZAYYAN
</h3>

<hr>

Pelanggan : ${t.pelanggan}<br>

Kendaraan : ${t.kendaraan}<br>

Layanan : ${t.layanan}<br>

Modal : Rp ${t.modal.toLocaleString()}<br>

Jasa : Rp ${t.jasa.toLocaleString()}<br>

Total : Rp ${t.total.toLocaleString()}<br>

DP : Rp ${t.dp.toLocaleString()}<br>

Sisa : Rp ${t.sisa.toLocaleString()}


`);


win.print();


}





loadData();

tampilkan();


</script>
