<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Transaksi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { margin-bottom: 20px; color: #0d47a1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: #2e7d32; color: white; width: 100%; margin-top: 10px; }
        .btn-back { background: #546e7a; color: white; padding: 8px 15px; display: inline-block; text-decoration: none; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Kembali</a>
    <h2>Form Transaksi Baru</h2>
    
    <div class="form-group">
        <label>Pelanggan</label>
        <select id="pilihPelanggan" onchange="filterKendaraan()">
            <option value="">-- Pilih Pelanggan --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Kendaraan (Nopol)</label>
        <select id="pilihKendaraan">
            <option value="">-- Pilih Kendaraan --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Status Berkas</label>
        <select id="statusBerkas">
            <option value="PROSES">PROSES</option>
            <option value="SELESAI">SELESAI</option>
        </select>
    </div>

    <div class="form-group">
        <input type="number" id="total" placeholder="Total Biaya (Rp)">
        <input type="number" id="dp" placeholder="DP (Rp)">
        <input type="number" id="jasa" placeholder="Biaya Jasa (Rp)">
    </div>

    <button onclick="simpanTransaksi()">Simpan Transaksi</button>
</div>

<script>
    // Load pelanggan ke dropdown
    const pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
    const kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

    const selPelanggan = document.getElementById("pilihPelanggan");
    pelanggan.forEach(p => {
        selPelanggan.innerHTML += `<option value="${p.nama}">${p.nama}</option>`;
    });

    // Filter kendaraan berdasarkan pelanggan yang dipilih
    function filterKendaraan() {
        let nama = document.getElementById("pilihPelanggan").value;
        let selKendaraan = document.getElementById("pilihKendaraan");
        selKendaraan.innerHTML = '<option value="">-- Pilih Kendaraan --</option>';
        
        kendaraan.filter(k => k.pengurus === nama).forEach(k => {
            selKendaraan.innerHTML += `<option value="${k.nopol}">${k.nopol} - ${k.merk}</option>`;
        });
    }

    function simpanTransaksi() {
        let pengurus = document.getElementById("pilihPelanggan").value;
        let nopol = document.getElementById("pilihKendaraan").value;
        let total = document.getElementById("total").value;
        let dp = document.getElementById("dp").value;
        let jasa = document.getElementById("jasa").value;
        let statusBerkas = document.getElementById("statusBerkas").value;
        
        let sisa = total - dp;

        if(pengurus && nopol && total) {
            let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            transaksi.push({pengurus, nopol, total, dp, jasa, sisa, statusBerkas, tgl: new Date().toLocaleDateString()});
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            
            alert("Transaksi berhasil disimpan!");
            window.location.href = "dashboard.html";
        } else {
            alert("Mohon isi data dengan lengkap!");
        }
    }
</script>

</body>
</html>
