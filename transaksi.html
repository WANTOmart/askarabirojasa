<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penyerahan Berkas</title>
    <style>
        body { font-family: Segoe UI, sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .btn-back-box { display: inline-block; padding: 10px 20px; border: 2px solid #546e7a; border-radius: 8px; color: #546e7a; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-back-box:hover { background-color: #546e7a; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-serah { background: #0288d1; color: white; padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; }
        .btn-print { background: #388e3c; color: white; padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back-box">← Kembali ke Dashboard</a>
    <h2>Penyerahan Berkas</h2>
    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Nopol</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelPenyerahan"></tbody>
    </table>
</div>

<script>
    function tampilkanPenyerahan() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "";
        tr.forEach((t, index) => {
            html += `<tr>
                <td>${t.pengurus}</td>
                <td>${t.nopol}</td>
                <td>${t.statusBerkas}</td>
                <td>
                    <button class="btn-serah" onclick="serahkan(${index})">Serahkan</button>
                    <button class="btn-print" onclick="cetakTandaTerima('${t.pengurus}', '${t.nopol}')">Cetak Bukti</button>
                </td>
            </tr>`;
        });
        document.getElementById("tabelPenyerahan").innerHTML = html;
    }

    function serahkan(index) {
        if(confirm('Ubah status berkas menjadi DISERAHKAN?')) {
            let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
            tr[index].statusBerkas = "DISERAHKAN";
            localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            tampilkanPenyerahan();
        }
    }

    function cetakTandaTerima(nama, nopol) {
        let w = window.open('', '_blank');
        w.document.write(`
            <html><body style="font-family:Arial; text-align:center;">
                <img src="logo-az.jpeg" style="width:150px; margin-bottom:20px;">
                <h2>TANDA TERIMA BERKAS</h2>
                <div style="text-align:left; display:inline-block; width: 80%;">
                    <p>Telah diterima berkas kendaraan:</p>
                    <p>Nama Pelanggan: <b>${nama}</b></p>
                    <p>Nomor Polisi: <b>${nopol}</b></p>
                    <p>Tanggal: ${new Date().toLocaleDateString()}</p>
                </div>
                <br><br><br>
                <table style="width:100%">
                    <tr><td>Yang Menyerahkan</td><td>Yang Menerima</td></tr>
                    <tr style="height:100px;">
                        <td><br>(Biro Jasa Askara Zayyan)</td>
                        <td><br>(........................)</td>
                    </tr>
                </table>
            </body></html>
        `);
        w.document.close();
        w.print();
    }
    tampilkanPenyerahan();
</script>
</body>
</html>
