<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input & Daftar Transaksi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h2 { margin-bottom: 20px; color: #0d47a1; }
        .form-container { background: #fcfcfc; padding: 15px; border-radius: 6px; border: 1px solid #eaeaea; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px; }
        .search-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .input-search { border: 2px solid #0d47a1; background: #fff; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; background: #2e7d32; color: white; font-weight: bold; }
        .btn-add { width: 100%; margin-top: 5px; }
        .btn-del { background: #c62828; color: white; padding: 5px 8px; border-radius: 4px; }
        .btn-print { background: #0288d1; color: white; padding: 5px 8px; border-radius: 4px; margin-right: 3px; }
        .btn-status { background: #ffa000; color: white; padding: 5px 8px; border-radius: 4px; margin-right: 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; color: #333; }
        .badge { padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .proses { background: #fff3e0; color: #e65100; }
        .selesai { background: #e8f5e9; color: #2e7d32; }
        .no-data { text-align: center; color: #888; font-style: italic; }
        .text-lunas { color: #2e7d32; font-weight: bold; }
        .text-piutang { color: #c62828; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" style="background:#546e7a; color:white; padding:8px 15px; text-decoration:none; border-radius:5px; display:inline-block; margin-bottom:15px;">← Kembali</a>
    <h2>Transaksi Baru</h2>
    
    <div class="form-container">
        <div class="form-group">
            <select id="pilihPelanggan" onchange="filterKendaraan()">
                <option value="">-- Pilih Pelanggan --</option>
            </select>
        </div>
        <div class="form-group">
            <select id="pilihKendaraan">
                <option value="">-- Pilih Kendaraan --</option>
            </select>
        </div>
        <div class="form-group">
            <div class="form-row-3" style="margin-top: 0; margin-bottom: 10px;">
                <select id="jenisLayanan">
                    <option value="">-- Pilih Jenis Layanan --</option>
                    <option value="PAJAK TAHUNAN">PAJAK TAHUNAN</option>
                    <option value="MUTASI">MUTASI</option>
                    <option value="CABUT BERKAS">CABUT BERKAS</option>
                </select>
                <input type="number" id="biayaBerkas" placeholder="Biaya Berkas / Pajak (Rp)">
                <input type="number" id="biayaJasa" placeholder="Biaya Jasa / Ongkos (Rp)">
            </div>
            <div class="form-row">
                <input type="number" id="dp" placeholder="DP (Rp) - Boleh dikosongkan">
                <select id="statusBerkas">
                    <option value="PROSES">PROSES</option>
                    <option value="SELESAI">SELESAI</option>
                </select>
            </div>
        </div>
        <button class="btn-add" onclick="simpanTransaksi()">Simpan Transaksi</button>
    </div>

    <div class="search-group">
        <input type="text" id="cari" class="input-search" placeholder="🔍 Cari transaksi berdasarkan nama pengurus, nopol, atau layanan..." onkeyup="tampilkanTabel()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Pengurus</th>
                <th>Nopol</th>
                <th>Layanan</th>
                <th>B. Berkas</th>
                <th>B. Jasa</th>
                <th>Total</th>
                <th>DP</th>
                <th>Sisa</th>
                <th>Status Berkas</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyTabel"></tbody>
    </table>
</div>

<script>
    const pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];
    const kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];

    // Mengisi pilihan pelanggan
    const selPelanggan = document.getElementById("pilihPelanggan");
    const pelangganTerurut = pelanggan.sort((a, b) => a.nama.localeCompare(b.nama));
    pelanggaTerurut = pelangganTerurut.forEach(p => {
        let opt = document.createElement("option");
        opt.value = p.nama;
        opt.textContent = p.nama;
        selPelanggan.appendChild(opt);
    });

    // Penyaringan plat nomor otomatis
    function filterKendaraan() {
        let nama = document.getElementById("pilihPelanggan").value;
        let selKendaraan = document.getElementById("pilihKendaraan");
        selKendaraan.innerHTML = '<option value="">-- Pilih Kendaraan --</option>';
        
        kendaraan.filter(k => k.pengurus === nama).forEach(k => {
            let opt = document.createElement("option");
            opt.value = k.nopol;
            opt.textContent = k.nopol;
            selKendaraan.appendChild(opt);
        });
    }

    function simpanTransaksi() {
        let pengurus = document.getElementById("pilihPelanggan").value;
        let nopol = document.getElementById("pilihKendaraan").value;
        let layanan = document.getElementById("jenisLayanan").value;
        let bBerkas = document.getElementById("biayaBerkas").value || 0;
        let bJasa = document.getElementById("biayaJasa").value || 0;
        let dp = document.getElementById("dp").value || 0;
        let statusBerkas = document.getElementById("statusBerkas").value;
        
        let total = parseInt(bBerkas) + parseInt(bJasa);

        if(pengurus && nopol && layanan && total > 0) {
            let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            transaksi.push({
                pengurus, 
                nopol, 
                layanan,
                biayaBerkas: parseInt(bBerkas),
                biayaJasa: parseInt(bJasa),
                total: total, 
                dp: parseInt(dp), 
                statusBerkas
            });
            localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
            alert("Data transaksi berhasil disimpan!");
            
            // Mengosongkan form input kembali
            document.getElementById("pilihPelanggan").value = "";
            document.getElementById("pilihKendaraan").innerHTML = '<option value="">-- Pilih Kendaraan --</option>';
            document.getElementById("jenisLayanan").value = "";
            document.getElementById("biayaBerkas").value = "";
            document.getElementById("biayaJasa").value = "";
            document.getElementById("dp").value = "";
            document.getElementById("statusBerkas").value = "PROSES";
            document.getElementById("cari").value = "";

            tampilkanTabel();
        } else {
            alert("Mohon lengkapi Pelanggan, Kendaraan, Jenis Layanan, dan rincian biaya!");
        }
    }

    function hapusTransaksi(i) {
        if(confirm('Apakah Anda yakin ingin menghapus transaksi ini?')) {
            let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
            tr.splice(i, 1);
            localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            tampilkanTabel();
        }
    }

    function ubahStatusBerkas(i) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        if (tr[i]) {
            tr[i].statusBerkas = tr[i].statusBerkas === "PROSES" ? "SELESAI" : "PROSES";
            localStorage.setItem("dataTransaksi", JSON.stringify(tr));
            tampilkanTabel();
        }
    }

    function cetakDP(nama, nopol, layanan, dp) {
        if (parseInt(dp) <= 0) {
            alert("Tidak ada nominal titipan uang (DP) pada transaksi ini untuk dicetak.");
            return;
        }

        let w = window.open('', '_blank');
        w.document.write(`
            <html>
            <head><title>Kwitansi</title></head>
            <body style="font-family:sans-serif; text-align:center; padding: 20px;" onload="window.print()">
                <div style="border: 2px dashed #333; padding: 20px; max-width: 400px; margin: auto; text-align: left;">
                    <h2 style="text-align:center; margin-bottom: 5px;">AZ-ZAHRA BIRO JASA</h2>
                    <p style="text-align:center; font-size:12px; margin-bottom:20px;">Nota Tanda Terima Titipan (DP)</p>
                    <hr style="border: 1px dashed #333;">
                    <p style="margin: 10px 0;">Nama Pengurus: <b>${nama}</b></p>
                    <p style="margin: 10px 0;">No. Polisi: <b>${nopol}</b></p>
                    <p style="margin: 10px 0;">Jenis Layanan: <b>${layanan}</b></p>
                    <p style="margin: 10px 0;">Nominal Uang: <b>Rp ${Number(dp).toLocaleString('id-ID')}</b></p>
                    <hr style="border: 1px dashed #333; margin-top:20px;">
                    <p style="text-align:center; font-size: 12px; margin-top: 15px;">Simpan resi ini sebagai bukti pengambilan berkas.</p>
                </div>
            </body>
            </html>
        `);
        w.document.close();
    }

    function tampilkanTabel() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let kataKunci = document.getElementById("cari").value.toLowerCase();
        let html = "";
        
        let dataDifilter = tr.map((t, index) => ({...t, indeksAsli: index}))
                             .filter(t => 
                                t.pengurus.toLowerCase().includes(kataKunci) || 
                                t.nopol.toLowerCase().includes(kataKunci) ||
                                (t.layanan && t.layanan.toLowerCase().includes(kataKunci))
                             );

        if(dataDifilter.length === 0) {
            html = `<tr><td colspan="10" class="no-data">Data transaksi tidak ditemukan</td></tr>`;
        } else {
            dataDifilter.forEach(t => {
                let berkas = Number(t.biayaBerkas) || 0;
                let jasa = Number(t.biayaJasa) || 0;
                let totalBiaya = Number(t.total) || (berkas + jasa);
                let uangMuka = Number(t.dp) || 0;
                let sisa = totalBiaya - uangMuka;
                let namaLayanan = t.layanan || "-";
                
                let kelasBadge = t.statusBerkas === "SELESAI" ? "selesai" : "proses";
                let kelasSisa = sisa <= 0 ? "text-lunas" : "text-piutang";
                let teksSisa = sisa <= 0 ? "Lunas" : `Rp ${sisa.toLocaleString('id-ID')}`;

                html += `<tr>
                    <td>${t.pengurus}</td>
                    <td><strong>${t.nopol}</strong></td>
                    <td><small>${namaLayanan}</small></td>
                    <td>Rp ${berkas.toLocaleString('id-ID')}</td>
                    <td>Rp ${jasa.toLocaleString('id-ID')}</td>
                    <td><strong>Rp ${totalBiaya.toLocaleString('id-ID')}</strong></td>
                    <td>Rp ${uangMuka.toLocaleString('id-ID')}</td>
                    <td class="${kelasSisa}">${teksSisa}</td>
                    <td><span class="badge ${kelasBadge}">${t.statusBerkas}</span></td>
                    <td>
                        <button class="btn-status" onclick="ubahStatusBerkas(${t.indeksAsli})">Status</button>
                        <button class="btn-print" onclick="cetakDP('${t.pengurus}', '${t.nopol}', '${namaLayanan}', ${uangMuka})">Cetak</button>
                        <button class="btn-del" onclick="hapusTransaksi(${t.indeksAsli})">Hapus</button>
                    </td>
                </tr>`;
            });
        }
        document.getElementById("bodyTabel").innerHTML = html;
    }

    tampilkanTabel();
</script>

</body>
</html>
