<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Transaksi</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn-del { background: #c62828; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard.html">← Kembali</a>
    <h2>Transaksi Baru</h2>
    <select id="pilihPelanggan" onchange="filterKendaraan()"><option value="">-- Pilih Pelanggan --</option></select>
    <select id="pilihKendaraan"><option value="">-- Pilih Kendaraan --</option></select>
    <input type="number" id="total" placeholder="Total Biaya">
    <input type="number" id="dp" placeholder="DP">
    <button onclick="simpanTransaksi()">Simpan Transaksi</button>
    <table id="tabelTransaksi"></table>
</div>

<script>
    function tampilkanTabel() {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        let html = "<tr><th>Pelanggan</th><th>Nopol</th><th>Total</th><th>DP</th><th>Sisa</th><th>Aksi</th></tr>";
        tr.forEach((t, i) => {
            let total = Number(t.total);
            let dp = Number(t.dp);
            let sisa = total - dp;
            html += `<tr><td>${t.pengurus}</td><td>${t.nopol}</td>
            <td>Rp ${total.toLocaleString('id-ID')}</td><td>Rp ${dp.toLocaleString('id-ID')}</td>
            <td>Rp ${sisa.toLocaleString('id-ID')}</td>
            <td><button onclick="cetakDP('${t.pengurus}', ${dp})">Cetak DP</button>
            <button class="btn-del" onclick="hapusTransaksi(${i})">Hapus</button></td></tr>`;
        });
        document.getElementById("tabelTransaksi").innerHTML = html;
    }

    function simpanTransaksi() {
        let p = document.getElementById("pilihPelanggan").value;
        let k = document.getElementById("pilihKendaraan").value;
        let t = document.getElementById("total").value;
        let d = document.getElementById("dp").value;
        let tr = JSON.parse(localStorage.getItem("dataTransaksi")) || [];
        tr.push({pengurus: p, nopol: k, total: t, dp: d, statusBerkas: 'PROSES'});
        localStorage.setItem("dataTransaksi", JSON.stringify(tr));
        tampilkanTabel();
    }

    function cetakDP(nama, dp) {
    let w = window.open('', '_blank');
    w.document.write(`
        <html>
            <head>
                <style>
                    body { font-family: sans-serif; text-align: center; }
                    .logo { width: 150px; margin-bottom: 10px; }
                    .content { text-align: left; display: inline-block; }
                </style>
            </head>
            <body>
                <img src="logo-az.jpeg" class="logo">
                <h2>Kwitansi DP</h2>
                <div class="content">
                    <p>Diterima dari: <b>${nama}</b></p>
                    <p>Nominal DP: <b>Rp ${dp.toLocaleString('id-ID')}</b></p>
                    <p>Status: Pembayaran Awal</p>
                </div>
            </body>
        </html>`);
    w.print();
}

function cetakLunas(nama, sisa) {
    let w = window.open('', '_blank');
    w.document.write(`
        <html>
            <head>
                <style>
                    body { font-family: sans-serif; text-align: center; }
                    .logo { width: 150px; margin-bottom: 10px; }
                    .content { text-align: left; display: inline-block; }
                </style>
            </head>
            <body>
                <img src="logo-az.jpeg" class="logo">
                <h2>Kwitansi Pelunasan</h2>
                <div class="content">
                    <p>Diterima dari: <b>${nama}</b></p>
                    <p>Nominal Pelunasan: <b>Rp ${sisa.toLocaleString('id-ID')}</b></p>
                    <p>Status: <b>LUNAS</b></p>
                </div>
            </body>
        </html>`);
    w.print();
}

    function hapusTransaksi(i) {
        let tr = JSON.parse(localStorage.getItem("dataTransaksi"));
        tr.splice(i, 1);
        localStorage.setItem("dataTransaksi", JSON.stringify(tr));
        tampilkanTabel();
    }
    tampilkanTabel();
</script>
</body>
</html>
