<script>

function loadData() {

    let pelanggan = JSON.parse(localStorage.getItem("dataPelanggan")) || [];

    let selectP = document.getElementById("pilihPelanggan");

    selectP.innerHTML = '<option value="">-- Pilih Pelanggan --</option>';

    pelanggan.forEach(p => {

        let opt = document.createElement("option");

        opt.value = p.nama;

        opt.textContent = p.nama;

        selectP.appendChild(opt);

    });

}



function filterKendaraan() {


    let nama = document.getElementById("pilihPelanggan").value;


    let kendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];


    let selectK = document.getElementById("pilihKendaraan");


    selectK.innerHTML = '<option value="">-- Pilih Kendaraan --</option>';



    kendaraan.forEach(k => {


        if(k.pengurus == nama || k.pemilik == nama || k.nama == nama){


            let opt = document.createElement("option");


            opt.value = k.nopol;


            opt.textContent = k.nopol + " - " + k.merk;


            selectK.appendChild(opt);


        }


    });


}




function simpanTransaksi(){



    let pelanggan = document.getElementById("pilihPelanggan").value;

    let kendaraan = document.getElementById("pilihKendaraan").value;

    let layanan = document.getElementById("jenisLayanan").value;


    let modal = Number(document.getElementById("biayaModal").value) || 0;

    let jasa = Number(document.getElementById("biayaJasa").value) || 0;


    let total = modal + jasa;


    let dp = Number(document.getElementById("dp").value) || 0;


    let sisa = total - dp;



    if(pelanggan=="" || kendaraan=="" || layanan==""){


        alert("Mohon pilih pelanggan, kendaraan dan layanan!");

        return;


    }



    let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];



    transaksi.push({


        pelanggan: pelanggan,

        kendaraan: kendaraan,

        layanan: layanan,

        modal: modal,

        jasa: jasa,

        total: total,

        dp: dp,

        sisa: sisa,

        statusBerkas:"PROSES"


    });



    localStorage.setItem(
        "dataTransaksi",
        JSON.stringify(transaksi)
    );



    alert("Transaksi berhasil disimpan");



    tampilkan();



    document.getElementById("jenisLayanan").value="";

    document.getElementById("biayaModal").value="";

    document.getElementById("biayaJasa").value="";

    document.getElementById("dp").value="";



}





function cetakStruk(index){


    let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];


    let t = transaksi[index];



    let win = window.open(
        "",
        "",
        "width=400,height=500"
    );



    win.document.write(`

    <html>

    <body style="font-family:monospace;padding:20px"

    onload="window.print();">


    <h3 style="text-align:center">

    BIRO JASA STNK<br>

    ASKARA ZAYYAN

    </h3>


    <hr>


    Pelanggan : ${t.pelanggan}<br>

    Kendaraan : ${t.kendaraan}<br>

    Layanan : ${t.layanan}<br>


    <hr>


    Modal : Rp ${t.modal.toLocaleString()}<br>

    Jasa : Rp ${t.jasa.toLocaleString()}<br>

    Total : Rp ${t.total.toLocaleString()}<br>

    DP : Rp ${t.dp.toLocaleString()}<br>

    Sisa : Rp ${t.sisa.toLocaleString()}<br>


    </body>

    </html>

    `);


}





function tampilkan(){



    let transaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];


    let html="";



    transaksi.forEach((t,i)=>{


        html += `

        <tr>

        <td>${t.pelanggan}</td>

        <td>${t.kendaraan}</td>

        <td>${t.layanan}</td>

        <td>Rp ${t.modal.toLocaleString()}</td>

        <td>Rp ${t.jasa.toLocaleString()}</td>

        <td>Rp ${t.total.toLocaleString()}</td>

        <td>Rp ${t.dp.toLocaleString()}</td>

        <td>Rp ${t.sisa.toLocaleString()}</td>


        <td>

        <button class="btn-print" onclick="cetakStruk(${i})">

        Cetak

        </button>

        </td>


        </tr>


        `;


    });



    document.getElementById("tabelTransaksi").innerHTML = html;



}





loadData();

tampilkan();


</script>
