<script>

function loadData(){

let pelanggan =
JSON.parse(localStorage.getItem("dataPelanggan")) || [];

let pilih =
document.getElementById("pilihPelanggan");


pilih.innerHTML =
'<option value="">-- Pilih Pelanggan --</option>';


pelanggan.forEach(p=>{

let o=document.createElement("option");

o.value=p.nama;

o.textContent=p.nama;

pilih.appendChild(o);

});


}



function filterKendaraan(){

let nama =
document.getElementById("pilihPelanggan").value;


let kendaraan =
JSON.parse(localStorage.getItem("dataKendaraan")) || [];


let pilih =
document.getElementById("pilihKendaraan");



pilih.innerHTML =
'<option value="">-- Pilih Kendaraan --</option>';



kendaraan.forEach(k=>{


if(k.pemilik==nama || k.pengurus==nama){


let o=document.createElement("option");


o.value=k.nopol;


o.textContent=k.nopol+" - "+k.merk;


pilih.appendChild(o);


}


});


}







function simpanTransaksi(){


let pelanggan =
document.getElementById("pilihPelanggan").value;


let kendaraan =
document.getElementById("pilihKendaraan").value;


let layanan =
document.getElementById("jenisLayanan").value;


let modal =
Number(document.getElementById("biayaModal").value);


let jasa =
Number(document.getElementById("biayaJasa").value);


let dp =
Number(document.getElementById("dp").value);



if(pelanggan=="" || kendaraan=="" || layanan==""){


alert("Lengkapi data dulu");


return;


}



let transaksi =
JSON.parse(localStorage.getItem("dataTransaksi")) || [];



transaksi.push({

pelanggan:pelanggan,

kendaraan:kendaraan,

layanan:layanan,

modal:modal,

jasa:jasa,

total:modal+jasa,

dp:dp,

sisa:(modal+jasa)-dp


});




localStorage.setItem(

"dataTransaksi",

JSON.stringify(transaksi)

);




alert("Berhasil Disimpan");



tampilkan();



}









function tampilkan(){



let data =

JSON.parse(localStorage.getItem("dataTransaksi")) || [];



let tabel =
document.getElementById("tabelTransaksi");



tabel.innerHTML="";




data.forEach((t,i)=>{


tabel.innerHTML += `


<tr>


<td>${t.pelanggan}</td>


<td>${t.kendaraan}</td>


<td>${t.layanan}</td>


<td>Rp ${t.modal.toLocaleString()}</td>


<td>Rp ${t.jasa.toLocaleString()}</td>


<td>Rp ${t.total.toLocaleString()}</td>


<td>Rp ${t.dp.toLocaleString()}</td>


<td>Rp ${t.sisa.toLocaleString()}</td>


<td>

<button class="btn-print"

onclick="cetak(${i})">

Cetak

</button>


</td>


</tr>



`;


});



}









function cetak(i){


let data =

JSON.parse(localStorage.getItem("dataTransaksi"))[i];



let w = window.open("","","width=400,height=500");



w.document.write(`


<h3 align="center">

BIRO JASA STNK<br>

ASKARA ZAYYAN

</h3>


<hr>


Pelanggan : ${data.pelanggan}<br>

Kendaraan : ${data.kendaraan}<br>

Layanan : ${data.layanan}<br><br>


Modal : Rp ${data.modal.toLocaleString()}<br>

Jasa : Rp ${data.jasa.toLocaleString()}<br>

Total : Rp ${data.total.toLocaleString()}<br>

DP : Rp ${data.dp.toLocaleString()}<br>

Sisa : Rp ${data.sisa.toLocaleString()}


`);



w.print();



}





loadData();

tampilkan();


</script>
