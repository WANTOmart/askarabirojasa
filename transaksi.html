<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Transaksi</title>

<style>
body{
    font-family:Segoe UI,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    margin-bottom:15px;
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0d47a1;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1565c0;
}

.back-link{
    display:block;
    margin-bottom:15px;
    text-decoration:none;
    color:#555;
}

.info{
    background:#f1f8ff;
    padding:10px;
    border-radius:5px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

    <a href="transaksi.html" class="back-link">
        ⬅ Kembali ke Daftar
    </a>

    <h2>Input Transaksi Baru</h2>

    <input type="text" id="nota" readonly>

    <input type="date" id="tanggal">

    <input type="text"
           id="pelanggan"
           placeholder="Nama Pelanggan">

    <input type="text"
           id="noPolisi"
           placeholder="Nomor Polisi">

    <select id="kendaraan">
        <option>Motor</option>
        <option>Mobil</option>
    </select>

    <select id="layanan">
        <option>Perpanjang STNK Tahunan</option>
        <option>Perpanjang STNK 5 Tahunan</option>
        <option>Mutasi Keluar Daerah</option>
        <option>Balik Nama Mobil</option>
        <option>Cabut Berkas</option>
    </select>

    <input type="number"
           id="biayaJasa"
           placeholder="Biaya Jasa">

    <input type="number"
           id="dp"
           placeholder="DP"
           value="0">

    <div class="info">
        Sisa Tagihan :
        <strong id="sisaTagihan">Rp 0</strong>
    </div>

    <select id="status">
        <option>Diproses</option>
        <option>Menunggu Loket</option>
        <option>Selesai</option>
    </select>

    <button onclick="simpan()">
        Simpan Data
    </button>

</div>

<script>

window.onload = function(){

    let data =
        JSON.parse(localStorage.getItem("dataTransaksi"))
        || [];

    document.getElementById("nota").value =
        "#TRX-" +
        (data.length + 1)
        .toString()
        .padStart(3,'0');

    document.getElementById("tanggal").value =
        new Date().toISOString().split("T")[0];

    hitungSisa();
}

document.getElementById("biayaJasa")
.addEventListener("input", hitungSisa);

document.getElementById("dp")
.addEventListener("input", hitungSisa);

function hitungSisa(){

    let biaya =
        Number(document.getElementById("biayaJasa").value);

    let dp =
        Number(document.getElementById("dp").value);

    let sisa = biaya - dp;

    document.getElementById("sisaTagihan")
    .innerText =
    "Rp " + sisa.toLocaleString("id-ID");
}

function simpan(){

    let biaya =
        Number(document.getElementById("biayaJasa").value);

    let dp =
        Number(document.getElementById("dp").value);

    let sisa = biaya - dp;

    let pembayaran =
        sisa <= 0
        ? "Lunas"
        : "Belum Lunas";

    let transaksi = {

        nota:
        document.getElementById("nota").value,

        tanggal:
        document.getElementById("tanggal").value,

        pelanggan:
        document.getElementById("pelanggan").value,

        noPolisi:
        document.getElementById("noPolisi").value,

        kendaraan:
        document.getElementById("kendaraan").value,

        layanan:
        document.getElementById("layanan").value,

        biayaJasa: biaya,

        dp: dp,

        sisa: sisa,

        pembayaran: pembayaran,

        statusBerkas:
        document.getElementById("status").value
    };

    let data =
        JSON.parse(localStorage.getItem("dataTransaksi"))
        || [];

    data.push(transaksi);

    localStorage.setItem(
        "dataTransaksi",
        JSON.stringify(data)
    );

    alert("Data berhasil disimpan");

    window.location.href =
        "transaksi.html";
}
</script>

</body>
</html>
