<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Transaksi</title>

<style>

*{
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.btn{
    text-decoration:none;
    padding:10px 15px;
    border-radius:5px;
    color:white;
    font-weight:bold;
}

.back{
    background:#546e7a;
}

.add{
    background:#0d47a1;
}

.info-box{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:#f7f9fc;
    padding:15px;
    border-radius:8px;
}

.card h3{
    color:#666;
    margin-bottom:5px;
}

.card p{
    font-size:22px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d47a1;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.lunas{
    color:green;
    font-weight:bold;
}

.belum{
    color:red;
    font-weight:bold;
}

button{
    border:none;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
    color:white;
    margin:2px;
}

.btn-bayar{
    background:#2e7d32;
}

.btn-cetak{
    background:#1565c0;
}

.btn-hapus{
    background:#c62828;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<a href="dashboard.html" class="btn back">
⬅ Dashboard
</a>

<h2>Data Transaksi</h2>

<a href="tambah_transaksi.html" class="btn add">
+ Tambah
</a>

</div>

<div class="info-box">

<div class="card">
<h3>Total Omzet</h3>
<p id="totalOmzet">Rp 0</p>
</div>

<div class="card">
<h3>Total Piutang</h3>
<p id="totalPiutang">Rp 0</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Nota</th>
<th>Tanggal</th>
<th>Pelanggan</th>
<th>No Polisi</th>
<th>Kendaraan</th>
<th>Layanan</th>
<th>Biaya</th>
<th>DP</th>
<th>Sisa</th>
<th>Pembayaran</th>
<th>Status Berkas</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="isiTabel"></tbody>

</table>

</div>

<script>

function renderTabel(){

    let data =
        JSON.parse(localStorage.getItem("dataTransaksi"))
        || [];

    let tbody =
        document.getElementById("isiTabel");

    tbody.innerHTML="";

    let totalOmzet=0;
    let totalPiutang=0;

    data.forEach((t,index)=>{

        totalOmzet += Number(t.biayaJasa);
        totalPiutang += Number(t.sisa);

        tbody.innerHTML += `
        <tr>

        <td>${t.nota}</td>

        <td>${t.tanggal}</td>

        <td>${t.pelanggan}</td>

        <td>${t.noPolisi}</td>

        <td>${t.kendaraan}</td>

        <td>${t.layanan}</td>

        <td>
        Rp ${Number(t.biayaJasa).toLocaleString('id-ID')}
        </td>

        <td>
        Rp ${Number(t.dp).toLocaleString('id-ID')}
        </td>

        <td>
        Rp ${Number(t.sisa).toLocaleString('id-ID')}
        </td>

        <td class="${
            t.pembayaran === 'Lunas'
            ? 'lunas'
            : 'belum'
        }">

        ${t.pembayaran}

        </td>

        <<th>Pembayaran</th>

        <td>

        <button
        class="btn-bayar"
        onclick="bayar(${index})">
        Bayar
        </button>

        <button
        class="btn-cetak"
        onclick="cetakNota(${index})">
        Cetak
        </button>

        <button
        class="btn-hapus"
        onclick="hapus(${index})">
        Hapus
        </button>

        </td>

        </tr>
        `;
    });

    document.getElementById("totalOmzet")
    .innerText =
    "Rp " +
    totalOmzet.toLocaleString("id-ID");

    document.getElementById("totalPiutang")
    .innerText =
    "Rp " +
    totalPiutang.toLocaleString("id-ID");
}

function bayar(index){

    let data =
        JSON.parse(localStorage.getItem("dataTransaksi"));

    let tambahan =
        prompt("Masukkan pembayaran tambahan");

    if(tambahan===null) return;

    tambahan = Number(tambahan);

    data[index].dp =
        Number(data[index].dp)
        + tambahan;

    data[index].sisa =
        Number(data[index].biayaJasa)
        - Number(data[index].dp);

    data[index].pembayaran =
        data[index].sisa <= 0
        ? "Lunas"
        : "Belum Lunas";

    localStorage.setItem(
        "dataTransaksi",
        JSON.stringify(data)
    );

    renderTabel();
}

function hapus(index){

    if(confirm("Hapus transaksi ini?")){

        let data =
            JSON.parse(localStorage.getItem("dataTransaksi"));

        data.splice(index,1);

        localStorage.setItem(
            "dataTransaksi",
            JSON.stringify(data)
        );

        renderTabel();
    }
}

function cetakNota(index){

    let data =
        JSON.parse(localStorage.getItem("dataTransaksi"));

    let t = data[index];

    let w =
        window.open("","","width=700,height=700");

    w.document.write(`
    <html>
    <head>
    <title>Nota</title>
    </head>
    <body>

    <h2>NOTA TRANSAKSI</h2>

    <hr>

    <p>No Nota : ${t.nota}</p>

    <p>Tanggal : ${t.tanggal}</p>

    <p>Pelanggan : ${t.pelanggan}</p>

    <p>No Polisi : ${t.noPolisi}</p>

    <p>Kendaraan : ${t.kendaraan}</p>

    <p>Layanan : ${t.layanan}</p>

    <hr>

    <p>Total Biaya :
    Rp ${Number(t.biayaJasa).toLocaleString('id-ID')}</p>

    <p>DP :
    Rp ${Number(t.dp).toLocaleString('id-ID')}</p>

    <p>Sisa :
    Rp ${Number(t.sisa).toLocaleString('id-ID')}</p>

    <h3>${t.pembayaran}</h3>

    </body>
    </html>
    `);

    w.print();
}

renderTabel();

</script>

</body>
</html>
