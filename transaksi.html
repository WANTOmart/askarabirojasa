<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Transaksi</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
        body{ background:#f4f6f9; padding:20px; }
        .container{ max-width:1100px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
        .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .btn{ padding:10px 15px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; text-decoration:none; color:white; }
        .back{ background:#546e7a; }
        .save{ background:#0d47a1; }
        .form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:20px; }
        input, select { padding:12px; border:1px solid #ddd; border-radius:6px; font-size: 14px; }
        table{ width:100%; border-collapse:collapse; }
        th{ background:#0d47a1; color:white; padding:10px; }
        td{ padding:10px; border-bottom:1px solid #ddd; text-align: center; }
        th { text-align: center; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; background: #e65100; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn back">⬅ Dashboard</a>
        <h2>Data Transaksi</h2>
    </div>

    <div class="form-grid">
        <input type="text" id="idTransaksi" placeholder="No. Invoice" readonly style="background: #eee;">
        
        <select id="pilihKendaraan" onchange="isiDataOtomatis()">
            <option value="">-- Pilih No. Plat --</option>
        </select>

        <input type="text" id="namaPelanggan" placeholder="Nama Pelanggan" readonly style="background: #eee;">
        <input type="text" id="stnk" placeholder="Nama Asli STNK" readonly style="background: #eee;">
        
        <select id="layanan">
            <option value="">-- Pilih Layanan --</option>
            <option value="Perpanjang STNK 1 Tahunan">Perpanjang STNK 1 Tahunan</option>
            <option value="Pajak 5 Tahunan (Ganti Plat)">Pajak 5 Tahunan (Ganti Plat)</option>
            <option value="Balik Nama (BBN-KB)">Balik Nama (BBN-KB)</option>
            <option value="Mutasi Keluar/Masuk">Mutasi Keluar/Masuk</option>
        </select>
        <button class="btn save" onclick="simpan()">Buat Transaksi</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>No. Transaksi</th>
                <th>No. Plat</th>
                <th>Pelanggan</th>
                <th>Nama STNK</th>
                <th>Layanan</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    let dataKendaraan = JSON.parse(localStorage.getItem("dataKendaraan")) || [];
    let dataTransaksi = JSON.parse(localStorage.getItem("dataTransaksi")) || [];

    function generateInvoice() {
        document.getElementById("idTransaksi").value = "TRX-" + Math.floor(100000 + Math.random() * 900000);
    }

    // Memasukkan list kendaraan ke dropdown nopol
    function muatPilihanKendaraan() {
        let select = document.getElementById("pilihKendaraan");
        dataKendaraan.forEach((k, index) => {
            let option = document.createElement("option");
            option.value = index;
            option.text = k.noPlat.toUpperCase();
            select.add(option);
        });
    }

    // Otomatis tarik data pelanggan & STNK berdasarkan kendaraan terpilih
    function isiDataOtomatis() {
        let indexTerpilih = document.getElementById("pilihKendaraan").value;
        if(indexTerpilih !== "") {
            let kendaraan = dataKendaraan[indexTerpilih];
            document.getElementById("namaPelanggan").value = kendaraan.namaPelanggan;
            document.getElementById("stnk").value = kendaraan.stnk;
        } else {
            document.getElementById("namaPelanggan").value = "";
            document.getElementById("stnk").value = "";
        }
    }

    function render(){
        let html = "";
        dataTransaksi.forEach((t)=>{
            html += `
            <tr>
                <td><strong>${t.idTransaksi}</strong></td>
                <td><strong>${t.noPlat.toUpperCase()}</strong></td>
                <td>${t.namaPelanggan}</td>
                <td>${t.stnk}</td>
                <td>${t.layanan}</td>
                <td><span class="badge">${t.statusBerkas}</span></td>
            </tr>
            `;
        });

        document.getElementById("isiTabel").innerHTML = html;
        localStorage.setItem("dataTransaksi", JSON.stringify(dataTransaksi));
        generateInvoice();
    }

    function simpan(){
        let idTransaksi = document.getElementById("idTransaksi").value;
        let indexKendaraan = document.getElementById("pilihKendaraan").value;
        let layanan = document.getElementById("layanan").value;

        if(indexKendaraan==="" || layanan==="") {
            alert("Harap pilih kendaraan dan layanan!");
            return;
        }

        let k = dataKendaraan[indexKendaraan];

        dataTransaksi.push({
            id: Date.now(),
            idTransaksi: idTransaksi,
            noPlat: k.noPlat,
            namaPelanggan: k.namaPelanggan,
            stnk: k.stnk,
            layanan: layanan,
            statusBerkas: "PROSES"
        });

        render();

        // Reset
        document.getElementById("pilihKendaraan").value = "";
        document.getElementById("namaPelanggan").value = "";
        document.getElementById("stnk").value = "";
        document.getElementById("layanan").value = "";
    }

    muatPilihanKendaraan();
    render();
</script>
</body>
</html>
